var msgAccId = null;
var msgPeerId = null;
var msgAccessHash = '';
var msgDialogs = [];
var msgMessages = [];
var msgPollTimer = null;
var msgAccounts = [];
/* Map telegram msg id -> {id: ai_message_id, rating: 'good'|'bad'|null} for the
   open chat, so the messenger can overlay 👍/👎 on the AI agent's own replies
   (self-learning loop runs right in the test chat). */
var msgAgentMap = {};

var MSG_AVATAR_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4'];
function msgAvtColor(name) {
  var h=0;
  for(var i=0;i<(name||'').length;i++) h=((h<<5)-h)+name.charCodeAt(i);
  return MSG_AVATAR_COLORS[Math.abs(h)%MSG_AVATAR_COLORS.length];
}

function msgFmtTime(d) {
  if(!d) return '';
  var dt = new Date(d);
  var now = new Date();
  var hh = String(dt.getHours()).padStart(2,'0');
  var mm = String(dt.getMinutes()).padStart(2,'0');
  var time = hh+':'+mm;
  /* Same day → just time */
  if(dt.toDateString() === now.toDateString()) return time;
  /* Yesterday */
  var yd = new Date(now); yd.setDate(yd.getDate()-1);
  if(dt.toDateString() === yd.toDateString()) return 'Вчера';
  /* This week (less than 7 days ago) → day name */
  var diff = (now.getTime() - dt.getTime()) / 86400000;
  if(diff < 7) {
    var days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    return days[dt.getDay()];
  }
  /* Older → dd.MM */
  var dd = String(dt.getDate()).padStart(2,'0');
  var mo = String(dt.getMonth()+1).padStart(2,'0');
  return dd+'.'+mo;
}

function msgTypeIcon(t) {
  if(t==='group') return '\uD83D\uDC65';
  if(t==='channel') return '\uD83D\uDCE2';
  return '\uD83D\uDC64';
}

function msgTypeName(t) {
  if(t==='group') return '\u0413\u0440\u0443\u043F\u043F\u0430';
  if(t==='channel') return '\u041A\u0430\u043D\u0430\u043B';
  return '\u041F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u0435\u043B\u044C';
}

function msgClearPoll() {
  if(msgPollTimer) { clearInterval(msgPollTimer); msgPollTimer = null; }
}

async function msgLoadAccounts() {
  try {
    var data = await af('/accounts?status=ACTIVE');
    msgAccounts = data.accounts || data.items || data || [];
    if(!Array.isArray(msgAccounts)) msgAccounts = [];
  } catch(e) {
    msgAccounts = [];
  }
}

async function msgLoadDialogs() {
  if(!msgAccId) { msgDialogs = []; return; }
  try {
    var data = await af('/telegram/'+msgAccId+'/dialogs');
    msgDialogs = data.dialogs || data.items || data || [];
    if(!Array.isArray(msgDialogs)) msgDialogs = [];
  } catch(e) {
    msgDialogs = [];
    var msg = e.message || '';
    if(msg.indexOf('NO_PROXY') > -1) {
      toast('Привяжите прокси к аккаунту для подключения к Telegram','error');
      var list = document.getElementById('msg-dlg-list');
      if(list) list.innerHTML = '<div class="msg-empty"><span style="font-size:2rem">\uD83D\uDD0C</span><span>Нет прокси</span><span class="txs c-m">Привяжите прокси к аккаунту для подключения к Telegram</span></div>';
    } else if(msg.indexOf('PROXY_FAIL') > -1) {
      toast('Прокси не работает — проверьте настройки прокси','error');
      var list = document.getElementById('msg-dlg-list');
      if(list) list.innerHTML = '<div class="msg-empty"><span style="font-size:2rem">\u26A0\uFE0F</span><span>Прокси не работает</span><span class="txs c-m">Проверьте статус и настройки прокси</span></div>';
    } else {
      toast('Ошибка загрузки диалогов: '+msg,'error');
    }
  }
}

async function msgLoadMessages() {
  if(!msgAccId || !msgPeerId) { msgMessages = []; return; }
  try {
    var ahParam = msgAccessHash ? '&ah='+encodeURIComponent(msgAccessHash) : '';
    var data = await af('/telegram/'+msgAccId+'/messages/'+msgPeerId+'?limit=50'+ahParam);
    msgMessages = data.messages || data.items || data || [];
    if(!Array.isArray(msgMessages)) msgMessages = [];
  } catch(e) {
    msgMessages = [];
    toast('\u041E\u0448\u0438\u0431\u043A\u0430 \u0437\u0430\u0433\u0440\u0443\u0437\u043A\u0438 \u0441\u043E\u043E\u0431\u0449\u0435\u043D\u0438\u0439: '+e.message,'error');
  }
  await msgLoadAgentMap();
}

/* Load AI-agent replies for the open chat and index them by telegram msg id.
   Tolerant: if there's no persona / no agent messages, the map is just empty. */
async function msgLoadAgentMap() {
  msgAgentMap = {};
  if(!msgPeerId) return;
  try {
    var r = await af('/ai-promoter/messages?chat_id='+encodeURIComponent(msgPeerId)+'&limit=300');
    (r.items||[]).forEach(function(m){
      if(m.tg_message_id!=null) msgAgentMap[String(m.tg_message_id)] = {id:m.id, rating:m.moderator_rating||null};
    });
  } catch(e) { /* no agent messages / endpoint busy \u2014 overlay simply absent */ }
}

async function msgSend(text) {
  if(!msgAccId || !msgPeerId || !text.trim()) return;
  try {
    await ap('/telegram/'+msgAccId+'/send', {peer_id: msgPeerId, text: text, access_hash: msgAccessHash || undefined});
    await msgLoadMessages();
    msgRenderMessages();
    msgScrollBottom();
  } catch(e) {
    toast('\u041E\u0448\u0438\u0431\u043A\u0430 \u043E\u0442\u043F\u0440\u0430\u0432\u043A\u0438: '+e.message,'error');
  }
}

function msgScrollBottom() {
  var body = document.getElementById('msg-body');
  if(body) body.scrollTop = body.scrollHeight;
}
function msgIsAtBottom() {
  var body = document.getElementById('msg-body');
  if(!body) return true;
  return (body.scrollHeight - body.scrollTop - body.clientHeight) < 80;
}

function msgRenderDialogs() {
  var list = document.getElementById('msg-dlg-list');
  if(!list) return;
  if(!msgDialogs.length) {
    list.innerHTML = '<div class="msg-empty"><span>\uD83D\uDCED</span><span>\u041D\u0435\u0442 \u0434\u0438\u0430\u043B\u043E\u0433\u043E\u0432</span></div>';
    return;
  }
  list.innerHTML = msgDialogs.map(function(d) {
    var thisPeer = d.username ? '@'+d.username : String(d.id||d.peer_id);
    var active = thisPeer == msgPeerId ? ' active' : '';
    var name = d.name || d.title || '\u0411\u0435\u0437 \u0438\u043C\u0435\u043D\u0438';
    var lastMsg = d.last_message || d.message || '';
    if(lastMsg.length > 40) lastMsg = lastMsg.substring(0,40) + '\u2026';
    var time = msgFmtTime(d.last_message_date || d.date);
    var letter = (name || '?')[0].toUpperCase();
    var color = msgAvtColor(name);
    var unread = d.unread_count || 0;
    var typeIc = msgTypeIcon(d.type || d.peer_type);
    var peerId = d.username ? '@'+d.username : String(d.id||d.peer_id);
    var ah = d.access_hash || '';
    return '<div class="dlg-item'+active+'" data-peer="'+esc(peerId)+'" data-numid="'+esc(d.id||d.peer_id)+'" data-ah="'+esc(ah)+'">' +
      '<div class="dlg-avatar" style="background:'+color+'">'+esc(letter)+'</div>' +
      '<div class="dlg-info">' +
        '<div class="dlg-name">'+typeIc+' '+esc(name)+'</div>' +
        '<div class="dlg-last">'+esc(lastMsg)+'</div>' +
      '</div>' +
      '<div class="dlg-meta">' +
        (time ? '<span class="dlg-time">'+esc(time)+'</span>' : '') +
        (unread > 0 ? '<span class="dlg-unread">'+unread+'</span>' : '') +
      '</div>' +
    '</div>';
  }).join('');
  list.querySelectorAll('.dlg-item').forEach(function(item) {
    item.onclick = function() {
      msgPeerId = item.dataset.peer;
      msgAccessHash = item.dataset.ah || '';
      msgClearPoll();
      msgRenderDialogs();
      msgLoadMessages().then(function() {
        msgRenderMessages();
        msgRenderHeader();
        msgRenderInputArea();
        msgScrollBottom();
        msgPollTimer = setInterval(function() {
          var wasAtBottom = msgIsAtBottom();
          msgLoadMessages().then(function() { msgRenderMessages(); if(wasAtBottom) msgScrollBottom(); });
        }, 5000);
      });
    };
  });
}

function msgRenderHeader() {
  var hdr = document.getElementById('msg-header');
  if(!hdr) return;
  if(!msgPeerId) {
    hdr.innerHTML = '';
    return;
  }
  var dlg = null;
  for(var i=0;i<msgDialogs.length;i++) {
    var dp = msgDialogs[i].username ? '@'+msgDialogs[i].username : String(msgDialogs[i].id||msgDialogs[i].peer_id);
    if(dp == msgPeerId) { dlg = msgDialogs[i]; break; }
  }
  if(!dlg) { hdr.innerHTML = ''; return; }
  var name = dlg.name || dlg.title || '\u0411\u0435\u0437 \u0438\u043C\u0435\u043D\u0438';
  var typeStr = msgTypeName(dlg.type || dlg.peer_type);
  var username = dlg.username ? '@'+dlg.username : '';
  hdr.innerHTML =
    '<div class="dlg-avatar" style="background:'+msgAvtColor(name)+';width:36px;height:36px;font-size:0.9rem">'+esc((name||'?')[0].toUpperCase())+'</div>' +
    '<div class="f1 mw0">' +
      '<div class="f ac g2x">' +
        '<span class="tsm fbol">'+esc(name)+'</span>' +
        '<span class="msg-type-badge">'+esc(typeStr)+'</span>' +
      '</div>' +
      (username ? '<div class="txs c-m">'+esc(username)+'</div>' : '') +
    '</div>';
}

function msgRenderMessages() {
  var body = document.getElementById('msg-body');
  if(!body) return;
  if(!msgPeerId) {
    body.innerHTML = '<div class="msg-empty"><span>\uD83D\uDCE9</span><span>\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u0434\u0438\u0430\u043B\u043E\u0433 \u0441\u043B\u0435\u0432\u0430</span></div>';
    return;
  }
  if(!msgMessages.length) {
    body.innerHTML = '<div class="msg-empty"><span>\uD83D\uDCED</span><span>\u041D\u0435\u0442 \u0441\u043E\u043E\u0431\u0449\u0435\u043D\u0438\u0439</span></div>';
    return;
  }
  /* Sort ascending by date (oldest first) */
  var sorted = msgMessages.slice().sort(function(a,b) {
    return new Date(a.date||0).getTime() - new Date(b.date||0).getTime();
  });
  body.innerHTML = sorted.map(function(m) {
    var isOut = m.out === true || m.out === 1;
    var cls = isOut ? 'msg-bubble msg-out' : 'msg-bubble msg-in';
    var sender = m.sender_name || m.from_name || '';
    var time = msgFmtTime(m.date);
    var text = m.text || m.message || '';
    var mediaHtml = '';
    if(m.media_type) {
      var mediaLabels = {photo:'\uD83D\uDCF7 \u0424\u043E\u0442\u043E',video:'\uD83C\uDFA5 \u0412\u0438\u0434\u0435\u043E',document:'\uD83D\uDCC4 \u0414\u043E\u043A\u0443\u043C\u0435\u043D\u0442',voice:'\uD83C\uDF99 \u0413\u043E\u043B\u043E\u0441\u043E\u0432\u043E\u0435',sticker:'\uD83D\uDCCC \u0421\u0442\u0438\u043A\u0435\u0440',audio:'\uD83C\uDFB5 \u0410\u0443\u0434\u0438\u043E'};
      mediaHtml = '<div class="msg-media">['+(mediaLabels[m.media_type]||m.media_type)+']</div>';
    }
    var replyHtml = '';
    if(m.reply_to_id) {
      replyHtml = '<div class="msg-reply-indicator">\u21A9 \u041E\u0442\u0432\u0435\u0442 \u043D\u0430 #'+esc(m.reply_to_id)+'</div>';
    }
    /* AI-agent reply? overlay a \uD83E\uDD16 tag + \uD83D\uDC4D/\uD83D\uDC4E rating bar (feeds self-learning) */
    var agent = isOut && m.id!=null ? msgAgentMap[String(m.id)] : null;
    return '<div class="'+cls+(agent?' msg-agent':'')+'">' +
      (!isOut && sender ? '<div class="msg-sender">'+esc(sender)+'</div>' : '') +
      (agent ? '<div class="msg-agent-tag">\uD83E\uDD16 \u0410\u0418-\u0430\u0433\u0435\u043D\u0442</div>' : '') +
      replyHtml +
      mediaHtml +
      (text ? '<div>'+esc(text)+'</div>' : '') +
      '<div class="msg-time">'+esc(time)+'</div>' +
      (agent ? msgRateBar(agent) : '') +
    '</div>';
  }).join('');
}

/* Render the \uD83D\uDC4D/\uD83D\uDC4E rating bar for one agent message (active state reflects
   the stored moderator_rating). aid = ai_message id passed to the rate API. */
function msgRateBar(agent){
  var g=agent.rating==='good', b=agent.rating==='bad';
  return '<div class="msg-rate">'+
    '<button class="msg-rate-btn'+(g?' on-good':'')+'" title="\u0425\u043E\u0440\u043E\u0448\u0438\u0439 \u043E\u0442\u0432\u0435\u0442 \u2014 \u0443\u0447\u0438\u0442\u044C\u0441\u044F \u043D\u0430 \u043D\u0451\u043C" onclick="msgRateAgent(event,\''+esc(agent.id)+'\',\'good\')">\uD83D\uDC4D</button>'+
    '<button class="msg-rate-btn'+(b?' on-bad':'')+'" title="\u041F\u043B\u043E\u0445\u043E\u0439 \u043E\u0442\u0432\u0435\u0442 \u2014 \u0438\u0437\u0431\u0435\u0433\u0430\u0442\u044C \u0442\u0430\u043A\u043E\u0433\u043E" onclick="msgRateAgent(event,\''+esc(agent.id)+'\',\'bad\')">\uD83D\uDC4E</button>'+
  '</div>';
}

/* Rate an agent reply \uD83D\uDC4D/\uD83D\uDC4E from inside the messenger. Toggles off if the same
   rating is clicked again. Optimistic: updates the map + re-renders immediately. */
async function msgRateAgent(ev, aiMsgId, rating){
  if(ev){ev.stopPropagation();}
  var entry=null,key=null;
  for(var k in msgAgentMap){ if(msgAgentMap[k] && msgAgentMap[k].id===aiMsgId){entry=msgAgentMap[k];key=k;break;} }
  if(!entry) return;
  var newRating = entry.rating===rating ? null : rating;
  var prev=entry.rating;
  entry.rating=newRating; msgRenderMessages();
  try{
    await ap('/ai-promoter/messages/'+aiMsgId+'/rate', {rating:newRating||'good', clear: newRating===null});
    toast(newRating==='good'?'\u041E\u0442\u0432\u0435\u0442 \u043F\u043E\u043C\u0435\u0447\u0435\u043D \u043A\u0430\u043A \u0445\u043E\u0440\u043E\u0448\u0438\u0439 \uD83D\uDC4D':newRating==='bad'?'\u041E\u0442\u0432\u0435\u0442 \u043F\u043E\u043C\u0435\u0447\u0435\u043D \u043A\u0430\u043A \u043F\u043B\u043E\u0445\u043E\u0439 \uD83D\uDC4E':'\u041E\u0446\u0435\u043D\u043A\u0430 \u0441\u043D\u044F\u0442\u0430','success');
  }catch(e){ entry.rating=prev; msgRenderMessages(); toast('\u041E\u0448\u0438\u0431\u043A\u0430 \u043E\u0446\u0435\u043D\u043A\u0438: '+e.message,'error'); }
}

function msgRenderInputArea() {
  var area = document.getElementById('msg-input-area');
  if(!area) return;
  if(!msgPeerId) {
    area.innerHTML = '';
    return;
  }
  area.innerHTML =
    '<textarea id="msg-ta" class="input" placeholder="\u041D\u0430\u043F\u0438\u0448\u0438\u0442\u0435 \u0441\u043E\u043E\u0431\u0449\u0435\u043D\u0438\u0435..." rows="1" style="resize:none;min-height:2.5rem;max-height:6rem"></textarea>' +
    '<button class="btn btn-primary" id="msg-send-btn" style="align-self:flex-end">'+ic('send')+' \u041E\u0442\u043F\u0440\u0430\u0432\u0438\u0442\u044C</button>';
  var ta = document.getElementById('msg-ta');
  var btn = document.getElementById('msg-send-btn');
  function doSend() {
    var txt = ta.value;
    if(!txt.trim()) return;
    ta.value = '';
    ta.style.height = '2.5rem';
    msgSend(txt);
  }
  btn.onclick = doSend;
  ta.addEventListener('keydown', function(e) {
    if(e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doSend();
    }
  });
  ta.addEventListener('input', function() {
    ta.style.height = '2.5rem';
    ta.style.height = Math.min(ta.scrollHeight, 96) + 'px';
  });
}

function rMessenger(el) {
  msgClearPoll();

  el.innerHTML =
    '<div class="msg-layout card" style="overflow:hidden">' +
      '<div class="msg-sidebar">' +
        '<div class="msg-acct-sel">' +
          '<div class="sel-w"><select id="msg-acc-sel" class="sel"><option value="">\u0417\u0430\u0433\u0440\u0443\u0437\u043A\u0430...</option></select></div>' +
        '</div>' +
        '<div class="msg-search">' +
          '<input type="text" id="msg-dlg-search" class="input" placeholder="\uD83D\uDD0D \u041F\u043E\u0438\u0441\u043A \u0434\u0438\u0430\u043B\u043E\u0433\u0430..." style="font-size:0.8rem">' +
        '</div>' +
        '<div class="msg-dialogs-list" id="msg-dlg-list">' +
          '<div class="msg-empty"><span>\u260E\uFE0F</span><span>\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u0430\u043A\u043A\u0430\u0443\u043D\u0442 \u0434\u043B\u044F \u043D\u0430\u0447\u0430\u043B\u0430</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="msg-main">' +
        '<div class="msg-header" id="msg-header"></div>' +
        '<div class="msg-body" id="msg-body">' +
          '<div class="msg-empty"><span>\uD83D\uDCE9</span><span>\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u0434\u0438\u0430\u043B\u043E\u0433 \u0441\u043B\u0435\u0432\u0430</span></div>' +
        '</div>' +
        '<div class="msg-input-area" id="msg-input-area"></div>' +
      '</div>' +
    '</div>';

  /* Load accounts into selector */
  msgLoadAccounts().then(function() {
    var sel = document.getElementById('msg-acc-sel');
    if(!sel) return;
    if(!msgAccounts.length) {
      sel.innerHTML = '<option value="">\u041D\u0435\u0442 \u0430\u043A\u0442\u0438\u0432\u043D\u044B\u0445 \u0430\u043A\u043A\u0430\u0443\u043D\u0442\u043E\u0432</option>';
      return;
    }
    sel.innerHTML = '<option value="">\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u0430\u043A\u043A\u0430\u0443\u043D\u0442</option>' +
      msgAccounts.map(function(a) {
        var phone = a.phone || a.phone_number || '';
        var name = a.first_name || a.name || '';
        var label = phone + (name ? ' ('+name+')' : '');
        var selected = a.id == msgAccId ? ' selected' : '';
        return '<option value="'+esc(a.id)+'"'+selected+'>'+esc(label)+'</option>';
      }).join('');

    sel.onchange = function() {
      msgClearPoll();
      msgAccId = sel.value || null;
      msgPeerId = null;
      msgDialogs = [];
      msgMessages = [];
      msgRenderHeader();
      msgRenderMessages();
      msgRenderInputArea();

      if(!msgAccId) {
        var list = document.getElementById('msg-dlg-list');
        if(list) list.innerHTML = '<div class="msg-empty"><span>\u260E\uFE0F</span><span>\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u0430\u043A\u043A\u0430\u0443\u043D\u0442 \u0434\u043B\u044F \u043D\u0430\u0447\u0430\u043B\u0430</span></div>';
        return;
      }

      /* Show loading skeleton */
      var list = document.getElementById('msg-dlg-list');
      if(list) list.innerHTML = [1,2,3,4,5].map(function() {
        return '<div class="dlg-item"><div class="skel" style="width:40px;height:40px;border-radius:50%;flex-shrink:0"></div><div class="f1 sy1"><div class="skel" style="height:0.85rem;width:60%"></div><div class="skel" style="height:0.7rem;width:80%"></div></div></div>';
      }).join('');

      msgLoadDialogs().then(function() {
        msgRenderDialogs();
      });
    };

    /* If account was previously selected, re-trigger */
    if(msgAccId) {
      sel.value = msgAccId;
      var list = document.getElementById('msg-dlg-list');
      if(list) list.innerHTML = [1,2,3,4,5].map(function() {
        return '<div class="dlg-item"><div class="skel" style="width:40px;height:40px;border-radius:50%;flex-shrink:0"></div><div class="f1 sy1"><div class="skel" style="height:0.85rem;width:60%"></div><div class="skel" style="height:0.7rem;width:80%"></div></div></div>';
      }).join('');
      msgLoadDialogs().then(function() {
        msgRenderDialogs();
        if(msgPeerId) {
          msgLoadMessages().then(function() {
            msgRenderHeader();
            msgRenderMessages();
            msgRenderInputArea();
            msgScrollBottom();
            msgPollTimer = setInterval(function() {
              var wasBot = msgIsAtBottom();
              msgLoadMessages().then(function() { msgRenderMessages(); if(wasBot) msgScrollBottom(); });
            }, 5000);
          });
        }
      });
    }
  });

  /* Dialog search filter */
  var searchInput = document.getElementById('msg-dlg-search');
  if(searchInput) {
    searchInput.oninput = function() {
      var q = searchInput.value.toLowerCase().trim();
      var items = document.querySelectorAll('#msg-dlg-list .dlg-item');
      items.forEach(function(item) {
        var name = (item.querySelector('.dlg-name') || {}).textContent || '';
        var last = (item.querySelector('.dlg-last') || {}).textContent || '';
        var match = !q || name.toLowerCase().indexOf(q) > -1 || last.toLowerCase().indexOf(q) > -1;
        item.style.display = match ? '' : 'none';
      });
    };
  }
}

/* ====================================================================
   MODAL HELPERS
   ==================================================================== */
function mBind(oid,cid){
  var ov=document.getElementById(oid);if(!ov)return;
  ov.onclick=function(e){if(e.target===ov)mClose(oid);};
  var cb=document.getElementById(cid);if(cb)cb.onclick=function(){mClose(oid);};
  function ek(e){if(e.key==='Escape'){mClose(oid);document.removeEventListener('keydown',ek);}}
  document.addEventListener('keydown',ek);
}
function mClose(oid){var o=document.getElementById(oid);if(o)o.remove();}

/* ====================================================================
   HEALTH CHECK
   ==================================================================== */
async function chkH(){
  try{var d=await af('/health');S.online=d.status==='ok'||d.status==='healthy';}
  catch(e){S.online=false;}
  updH();
  chkEngine();
}

/* Статус фонового движка (Celery worker): баннер, когда воркер офлайн. */
async function chkEngine(){
  var b=document.getElementById('engine-banner');
  try{
    var st=await af('/system/status');
    var online=!!(st&&st.worker_online);
    if(b){if(online)b.classList.add('hid');else b.classList.remove('hid');}
    /* Dashboard engine card (present only on the dashboard) */
    var dot=document.getElementById('dash-engine-dot'),lbl=document.getElementById('dash-engine-lbl');
    if(dot&&lbl){
      if(online){
        dot.classList.add('online');
        var n=(st.workers&&st.workers.length)||0;
        lbl.textContent='воркер онлайн'+(n?' ('+n+')':'');
        lbl.style.color='';
      }else{
        dot.classList.remove('online');
        lbl.textContent=(st&&st.broker_reachable)?'воркер офлайн — задачи не исполняются':'движок недоступен';
        lbl.style.color='var(--red-500)';
      }
    }
  }catch(e){/* не наводим панику на сетевых сбоях статуса */}
}

/* ====================================================================
   AUTH (auto-login with dev token)
   ==================================================================== */
function initAuth(){
  S.ws=wsId()||'default';
  S.tok=localStorage.getItem('tg-admin-token')||'dev-admin-token-12345';
  localStorage.setItem('tg-admin-token',S.tok);
  showApp();
}

function showApp(){
  document.getElementById('app').classList.remove('hid');
  /* Read hash for initial section */
  var h=location.hash.replace('#','');
  var hParts=h.split('/');
  var hSec=hParts[0];
  var hId=hParts[1]||null;
  if(hSec&&NAV.some(function(n){return n.k===hSec;}))S.sec=hSec;
  /* Restore detail view if ID in hash */
  if(hSec==='accounts'&&hId){
    S.accDetail={id:hId};
    af('/accounts/'+hId).then(function(acc){S.accDetail=acc;rMain();}).catch(function(){S.accDetail=null;rMain();});
  }
  rSide();rMain();chkH();
  setInterval(chkH,15000);
  setInterval(function(){
    if(S.sec==='dashboard'){dashLoaded=false;ldDash().then(function(){if(S.sec==='dashboard')rDash(document.getElementById('mc'));});}
  },30000);
}

/* ====================================================================
   HASH NAVIGATION
   ==================================================================== */
window.onhashchange=function(){
  var h=location.hash.replace('#','');
  var hParts=h.split('/');
  var hSec=hParts[0];
  var hId=hParts[1]||null;
  if(hSec&&NAV.some(function(n){return n.k===hSec;})){
    if(hSec!==S.sec){
      S.sec=hSec;S.accDetail=null;bstDetail=null;sbstDetail=null;clnDetail=null;cchDetail=null;cnvDetail=null;msgClearPoll();
    }
    if(hSec==='accounts'&&hId){
      af('/accounts/'+hId).then(function(acc){S.accDetail=acc;rSide();rMain();}).catch(function(){S.accDetail=null;rSide();rMain();});
      return;
    }
    rSide();rMain();
  }
};

initTh();
document.getElementById('theme-btn').onclick=togTh;
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initAuth);
else initAuth();

})();
