function mCrCbc(){
  var step=1,maxStep=5;
  var stepLabels=['Сообщение','Каналы','Аккаунты','Расписание','Safety'];
  var fd={name:'',content_type:'post',template_id:'',slow_mode_behavior:'wait',target_channels:'',exclude_channels:'',distribution:'one_per_chat',posts_per_day:3,account_ids:'',start_type:'now',posting_time:'random',gap_24h:true,delete_detection:true,ban_auto_stop:true,notify:true};
  var tplOpts=[];
  af('/templates?category=CHAT_POST').then(function(r){tplOpts=r.items||[];}).catch(function(){}).finally(function(){show();});

  function renderWizard(){
    var stepsHtml='<div class="wiz-steps">';
    for(var i=1;i<=maxStep;i++){var cls=i<step?'wiz-done':i===step?'wiz-active':'wiz-pending';stepsHtml+='<div class="wiz-step '+cls+'"><span class="wiz-num">'+(i<step?'&#10003;':i)+'</span><span class="wiz-label">'+stepLabels[i-1]+'</span></div>';}
    stepsHtml+='</div>';
    var bodyHtml='<div class="wiz-body sy3">';
    switch(step){
      case 1:
        bodyHtml+='<div><label class="lbl">Название кампании *</label><input class="input tsm" id="wiz-name" value="'+esc(fd.name)+'" placeholder="Бизнес-чаты прогрев"></div>'+
          '<div><label class="lbl">Тип контента</label><div class="f g3x mt2"><label class="f ac g1h tsm"><input type="radio" name="wiz-ct" value="post"'+(fd.content_type==='post'?' checked':'')+'> Пост</label><label class="f ac g1h tsm"><input type="radio" name="wiz-ct" value="reply"'+(fd.content_type==='reply'?' checked':'')+'> Reply</label><label class="f ac g1h tsm"><input type="radio" name="wiz-ct" value="thread"'+(fd.content_type==='thread'?' checked':'')+'> Тред</label></div></div>'+
          '<div><label class="lbl">Шаблон *</label><div class="sel-w"><select class="sel" id="wiz-tpl"><option value="">-- выберите --</option>'+tplOpts.map(function(t){return '<option value="'+t.id+'"'+(fd.template_id===t.id?' selected':'')+'>'+esc(t.name)+'</option>';}).join('')+'</select></div></div>'+
          '<div><label class="lbl">Поведение при slow-mode</label><div class="sel-w"><select class="sel" id="wiz-slow"><option value="wait"'+(fd.slow_mode_behavior==='wait'?' selected':'')+'>Ждать окончания</option><option value="skip"'+(fd.slow_mode_behavior==='skip'?' selected':'')+'>Пропустить</option><option value="next_account"'+(fd.slow_mode_behavior==='next_account'?' selected':'')+'>Другой аккаунт</option></select></div></div>';
        break;
      case 2:
        bodyHtml+='<div><label class="lbl">Целевые каналы (по одному на строку) *</label><textarea class="ta" id="wiz-ch" placeholder="@crypto_chat\n@business_group\nhttps://t.me/channel123" style="min-height:140px">'+esc(fd.target_channels)+'</textarea></div>'+
          '<div><label class="lbl">Исключить каналы</label><textarea class="ta" id="wiz-exch" placeholder="@exclude_channel" style="min-height:60px">'+esc(fd.exclude_channels)+'</textarea></div>';
        break;
      case 3:
        bodyHtml+='<div><label class="lbl">Распределение аккаунтов</label><div class="sel-w"><select class="sel" id="wiz-dist"><option value="one_per_chat"'+(fd.distribution==='one_per_chat'?' selected':'')+'>1 чат = 1 аккаунт</option><option value="round_robin"'+(fd.distribution==='round_robin'?' selected':'')+'>Round-robin</option></select></div></div>'+
          '<div><label class="lbl">Постов / аккаунт / день</label><input class="input tsm" type="number" id="wiz-ppd" value="'+fd.posts_per_day+'" style="width:8rem"></div>'+
          '<div><label class="lbl">Аккаунты (ID по строке, пусто = все активные)</label><textarea class="ta" id="wiz-acc" placeholder="Оставьте пустым" style="min-height:80px">'+esc(fd.account_ids)+'</textarea></div>';
        break;
      case 4:
        bodyHtml+='<div><label class="lbl">Начало</label><div class="f g3x mt2"><label class="f ac g1h tsm"><input type="radio" name="wiz-st" value="now"'+(fd.start_type==='now'?' checked':'')+'> Сразу</label><label class="f ac g1h tsm"><input type="radio" name="wiz-st" value="schedule"'+(fd.start_type==='schedule'?' checked':'')+'> По графику</label></div></div>'+
          '<div><label class="lbl">Время постинга</label><div class="sel-w"><select class="sel" id="wiz-pt"><option value="ai"'+(fd.posting_time==='ai'?' selected':'')+'>AI-оптимальное</option><option value="random"'+(fd.posting_time==='random'?' selected':'')+'>Случайное</option><option value="specific"'+(fd.posting_time==='specific'?' selected':'')+'>Конкретное время</option></select></div></div>'+
          '<div class="mt3"><label class="f ac g2x" style="cursor:pointer"><input type="checkbox" class="chk" id="wiz-gap"'+(fd.gap_24h?' checked':'')+'><span class="tsm">Гарантировать 24ч между постами в одном канале</span></label></div>';
        break;
      case 5:
        var chCount=fd.target_channels?fd.target_channels.split('\n').filter(function(s){return s.trim();}).length:0;
        bodyHtml+='<div class="sy2h"><label class="f ac g2x" style="cursor:pointer"><input type="checkbox" class="chk" id="wiz-deldet"'+(fd.delete_detection?' checked':'')+'><span class="tsm">Отслеживать удаление постов модераторами</span></label><label class="f ac g2x" style="cursor:pointer"><input type="checkbox" class="chk" id="wiz-banstop"'+(fd.ban_auto_stop?' checked':'')+'><span class="tsm">Автостоп при бане аккаунта из чата</span></label><label class="f ac g2x" style="cursor:pointer"><input type="checkbox" class="chk" id="wiz-notif"'+(fd.notify?' checked':'')+'><span class="tsm">Уведомления в TG-бот</span></label></div>'+
          '<div class="sep"></div><div class="txs fsem upc c-m tkw mb2">Прогноз</div><div class="wiz-cost">'+
            '<div class="wiz-cost-row"><span>Название</span><span class="fbol">'+esc(fd.name||'--')+'</span></div>'+
            '<div class="wiz-cost-row"><span>Каналов</span><span class="fbol">'+chCount+'</span></div>'+
            '<div class="wiz-cost-row"><span>Постов / день</span><span>'+fd.posts_per_day+'</span></div>'+
            '<div class="wiz-cost-row"><span>Распределение</span><span>'+esc(fd.distribution)+'</span></div>'+
          '</div>';
        break;
    }
    bodyHtml+='</div>';
    var footerHtml='<div class="dlg-ft">'+(step>1?'<button class="btn btn-sm" id="wiz-prev">\u2190 Назад</button>':'<button class="btn btn-sm" id="mcl">Отмена</button>')+(step<maxStep?'<button class="btn btn-sm btn-primary" id="wiz-next">Далее \u2192</button>':'<button class="btn btn-sm btn-primary" id="wiz-submit">\u25B6 Запустить</button>')+'</div>';
    return stepsHtml+bodyHtml+footerHtml;
  }
  function saveStep(){
    switch(step){
      case 1:var n=document.getElementById('wiz-name');if(n)fd.name=n.value.trim();var ct=document.querySelector('input[name="wiz-ct"]:checked');if(ct)fd.content_type=ct.value;var t=document.getElementById('wiz-tpl');if(t)fd.template_id=t.value;var sl=document.getElementById('wiz-slow');if(sl)fd.slow_mode_behavior=sl.value;break;
      case 2:var ch=document.getElementById('wiz-ch');if(ch)fd.target_channels=ch.value;var ex=document.getElementById('wiz-exch');if(ex)fd.exclude_channels=ex.value;break;
      case 3:var di=document.getElementById('wiz-dist');if(di)fd.distribution=di.value;var pp=document.getElementById('wiz-ppd');if(pp)fd.posts_per_day=parseInt(pp.value)||3;var ac=document.getElementById('wiz-acc');if(ac)fd.account_ids=ac.value;break;
      case 4:var st=document.querySelector('input[name="wiz-st"]:checked');if(st)fd.start_type=st.value;var pt=document.getElementById('wiz-pt');if(pt)fd.posting_time=pt.value;var g=document.getElementById('wiz-gap');if(g)fd.gap_24h=g.checked;break;
      case 5:var dd=document.getElementById('wiz-deldet');if(dd)fd.delete_detection=dd.checked;var bs=document.getElementById('wiz-banstop');if(bs)fd.ban_auto_stop=bs.checked;var no=document.getElementById('wiz-notif');if(no)fd.notify=no.checked;break;
    }
  }
  function show(){
    var h='<div class="dlg-ov" id="mov"><div class="dlg dlg-xl"><div class="dlg-hd"><div class="dlg-tt">'+ic('send')+' Новая кампания по чатам &mdash; шаг '+step+' из '+maxStep+'</div></div><div class="dlg-bd" id="wiz-content">'+renderWizard()+'</div></div></div>';
    document.body.insertAdjacentHTML('beforeend',h);bind();
  }
  function update(){var c=document.getElementById('wiz-content');if(!c)return;c.innerHTML=renderWizard();bind();}
  function bind(){
    var ov=document.getElementById('mov');if(!ov)return;
    ov.onclick=function(e){if(e.target===ov)mClose('mov');};
    var cl=document.getElementById('mcl');if(cl)cl.onclick=function(){mClose('mov');};
    function ek(e){if(e.key==='Escape'){mClose('mov');document.removeEventListener('keydown',ek);}}document.addEventListener('keydown',ek);
    var prev=document.getElementById('wiz-prev');if(prev)prev.onclick=function(){saveStep();step--;update();};
    var next=document.getElementById('wiz-next');if(next)next.onclick=function(){saveStep();if(step===1&&!fd.name){toast('Введите название','error');return;}if(step===1&&!fd.template_id){toast('Выберите шаблон','error');return;}if(step===2){var chs=fd.target_channels.trim().split('\n').filter(function(s){return s.trim();});if(!chs.length){toast('Укажите каналы','error');return;}}step++;update();};
    var sub=document.getElementById('wiz-submit');if(sub)sub.onclick=async function(){
      saveStep();sub.disabled=true;sub.innerHTML='<span class="spin"></span> Запуск...';
      var channels=fd.target_channels.trim().split('\n').map(function(s){return s.trim();}).filter(Boolean);
      var accIds=fd.account_ids.trim().split('\n').map(function(s){return s.trim();}).filter(Boolean);
      try{
        await ap('/chat-broadcasts',{name:fd.name,template_id:fd.template_id,target_channels:channels,account_ids:accIds.length?accIds:undefined,config:{content_type:fd.content_type,slow_mode_behavior:fd.slow_mode_behavior,exclude_channels:fd.exclude_channels.trim().split('\n').filter(function(s){return s.trim();}),distribution:fd.distribution,posts_per_day:fd.posts_per_day,start_type:fd.start_type,posting_time:fd.posting_time,gap_24h:fd.gap_24h,delete_detection:fd.delete_detection,ban_auto_stop:fd.ban_auto_stop,notify:fd.notify}});
        toast('Кампания создана','success');mClose('mov');cbcLoaded=false;await ldCbc();if(S.sec==='chat-broadcast')rChatBroadcast(document.getElementById('mc'));
      }catch(er){toast(er.message,'error');sub.disabled=false;sub.innerHTML='\u25B6 Запустить';}
    };
  }
}

function mCrInv(){
  var step=1,maxStep=5;
  var stepLabels=['Целевой канал','Аудитория','Аккаунты','Safety','Запуск'];
  var fd={name:'',target_channel:'',mode:'DIRECT',audience_id:'',filter_premium:false,filter_online:false,filter_ai_score_min:0,account_ids:'',flood_behavior:'pause_24h',privacy_threshold:20,emergency_stop_pct:30,ramp_up:false};
  var audOpts=[];
  af('/audiences').then(function(r){audOpts=r.items||[];}).catch(function(){}).finally(function(){show();});

  function renderWizard(){
    var stepsHtml='<div class="wiz-steps">';
    for(var i=1;i<=maxStep;i++){var cls=i<step?'wiz-done':i===step?'wiz-active':'wiz-pending';stepsHtml+='<div class="wiz-step '+cls+'"><span class="wiz-num">'+(i<step?'&#10003;':i)+'</span><span class="wiz-label">'+stepLabels[i-1]+'</span></div>';}
    stepsHtml+='</div>';
    var bodyHtml='<div class="wiz-body sy3">';
    switch(step){
      case 1:
        bodyHtml+='<div><label class="lbl">Название *</label><input class="input tsm" id="wiz-name" value="'+esc(fd.name)+'" placeholder="Инвайт в @my_channel"></div>'+
          '<div><label class="lbl">Целевой канал * (где ваш аккаунт админ)</label><input class="input tsm" id="wiz-target" value="'+esc(fd.target_channel)+'" placeholder="@my_promo_channel или ID канала"></div>'+
          '<div><label class="lbl">Режим</label><div class="f g3x mt2"><label class="f ac g1h tsm"><input type="radio" name="wiz-mode" value="DIRECT"'+(fd.mode==='DIRECT'?' checked':'')+'> Direct (напрямую)</label><label class="f ac g1h tsm"><input type="radio" name="wiz-mode" value="INVITE_LINK"'+(fd.mode==='INVITE_LINK'?' checked':'')+'> Invite Link</label></div></div>';
        break;
      case 2:
        bodyHtml+='<div><label class="lbl">Аудитория *</label><div class="sel-w"><select class="sel" id="wiz-aud"><option value="">-- выберите --</option>'+audOpts.map(function(a){return '<option value="'+a.id+'"'+(fd.audience_id===a.id?' selected':'')+'>'+esc(a.name)+' ('+esc(a.total_count||0)+')</option>';}).join('')+'</select></div></div>'+
          '<div class="txs fsem upc c-m tkw mt3">Фильтры</div>'+
          '<div class="f g3x mt2"><label class="f ac g1h txs"><input type="checkbox" class="chk" id="wiz-fprem"'+(fd.filter_premium?' checked':'')+'> Только Premium</label><label class="f ac g1h txs"><input type="checkbox" class="chk" id="wiz-fonl"'+(fd.filter_online?' checked':'')+'> Только онлайн</label></div>'+
          '<div class="mt2"><label class="lbl">AI-score минимум</label><input class="input tsm" type="number" id="wiz-fscore" value="'+fd.filter_ai_score_min+'" min="0" max="100" style="width:8rem"></div>';
        break;
      case 3:
        bodyHtml+='<div><label class="lbl">Аккаунты (только ACTIVE, админ в целевом канале)</label><textarea class="ta" id="wiz-acc" placeholder="Оставьте пустым для авто-выбора всех подходящих аккаунтов" style="min-height:100px">'+esc(fd.account_ids)+'</textarea><div class="txs c-m mt1">Будут использованы только аккаунты со статусом ACTIVE, которые являются админами в указанном канале</div></div>';
        break;
      case 4:
        bodyHtml+='<div><label class="lbl">Поведение при FloodWait</label><div class="sel-w"><select class="sel" id="wiz-flood"><option value="pause_24h"'+(fd.flood_behavior==='pause_24h'?' selected':'')+'>Пауза 24ч</option><option value="pause_48h"'+(fd.flood_behavior==='pause_48h'?' selected':'')+'>Пауза 48ч</option><option value="switch_account"'+(fd.flood_behavior==='switch_account'?' selected':'')+'>Переключить аккаунт</option></select></div></div>'+
          '<div class="g g2 mt3"><div><label class="lbl">Порог PrivacyRestricted (%)</label><input class="input tsm" type="number" id="wiz-priv" value="'+fd.privacy_threshold+'" min="1" max="100"><div class="txs c-m mt1">Остановка если % приватных профилей превысит значение</div></div><div><label class="lbl">Порог аварийной остановки (%)</label><input class="input tsm" type="number" id="wiz-estop" value="'+fd.emergency_stop_pct+'" min="1" max="100"><div class="txs c-m mt1">Остановка при превышении % ошибок</div></div></div>'+
          '<div class="mt3"><label class="f ac g2x" style="cursor:pointer"><input type="checkbox" class="chk" id="wiz-ramp"'+(fd.ramp_up?' checked':'')+'><span class="tsm">Ramp-up (постепенное увеличение)</span></label></div>';
        break;
      case 5:
        var audName='--',audSize=0;audOpts.forEach(function(a){if(a.id===fd.audience_id){audName=a.name;audSize=a.total_count||0;}});
        var accCount=fd.account_ids?fd.account_ids.split('\n').filter(function(s){return s.trim();}).length:0;
        var attemptsPerDay=180;

        var expSuccess=Math.round(audSize*0.6);
        bodyHtml+='<div class="txs fsem upc c-m tkw mb2">Прогноз инвайтинга</div><div class="wiz-cost">'+

          '<div class="wiz-cost-row"><span>Кандидатов</span><span class="fbol">'+audSize+'</span></div>'+
          '<div class="wiz-cost-row"><span>Аккаунтов</span><span>'+(accCount||'авто-выбор')+'</span></div>'+

          '<div class="wiz-cost-row"><span>ETA</span><span class="fbol">~'+estDays+' дней</span></div>'+
          '<div class="wiz-cost-row wiz-cost-total"><span>Ожидаемый успех (~60%)</span><span>~'+expSuccess+'</span></div>'+
        '</div>';
        break;
    }
    bodyHtml+='</div>';
    var footerHtml='<div class="dlg-ft">'+(step>1?'<button class="btn btn-sm" id="wiz-prev">\u2190 Назад</button>':'<button class="btn btn-sm" id="mcl">Отмена</button>')+(step<maxStep?'<button class="btn btn-sm btn-primary" id="wiz-next">Далее \u2192</button>':'<button class="btn btn-sm btn-primary" id="wiz-submit">\u25B6 Запустить</button>')+'</div>';
    return stepsHtml+bodyHtml+footerHtml;
  }
  function saveStep(){
    switch(step){
      case 1:var n=document.getElementById('wiz-name');if(n)fd.name=n.value.trim();var t=document.getElementById('wiz-target');if(t)fd.target_channel=t.value.trim();var m=document.querySelector('input[name="wiz-mode"]:checked');if(m)fd.mode=m.value;break;
      case 2:var a=document.getElementById('wiz-aud');if(a)fd.audience_id=a.value;var fp=document.getElementById('wiz-fprem');if(fp)fd.filter_premium=fp.checked;var fo=document.getElementById('wiz-fonl');if(fo)fd.filter_online=fo.checked;var fs=document.getElementById('wiz-fscore');if(fs)fd.filter_ai_score_min=parseInt(fs.value)||0;break;
      case 3:var ac=document.getElementById('wiz-acc');if(ac)fd.account_ids=ac.value;break;
      case 4:var fl=document.getElementById('wiz-flood');if(fl)fd.flood_behavior=fl.value;var pr=document.getElementById('wiz-priv');if(pr)fd.privacy_threshold=parseInt(pr.value)||20;var es=document.getElementById('wiz-estop');if(es)fd.emergency_stop_pct=parseInt(es.value)||30;var rp=document.getElementById('wiz-ramp');if(rp)fd.ramp_up=rp.checked;break;
    }
  }
  function show(){
    var h='<div class="dlg-ov" id="mov"><div class="dlg dlg-xl"><div class="dlg-hd"><div class="dlg-tt">'+ic('users')+' Новый инвайтинг &mdash; шаг '+step+' из '+maxStep+'</div></div><div class="dlg-bd" id="wiz-content">'+renderWizard()+'</div></div></div>';
    document.body.insertAdjacentHTML('beforeend',h);bind();
  }
  function update(){var c=document.getElementById('wiz-content');if(!c)return;c.innerHTML=renderWizard();bind();}
  function bind(){
    var ov=document.getElementById('mov');if(!ov)return;
    ov.onclick=function(e){if(e.target===ov)mClose('mov');};
    var cl=document.getElementById('mcl');if(cl)cl.onclick=function(){mClose('mov');};
    function ek(e){if(e.key==='Escape'){mClose('mov');document.removeEventListener('keydown',ek);}}document.addEventListener('keydown',ek);
    var prev=document.getElementById('wiz-prev');if(prev)prev.onclick=function(){saveStep();step--;update();};
    var next=document.getElementById('wiz-next');if(next)next.onclick=function(){saveStep();if(step===1&&!fd.name){toast('Введите название','error');return;}if(step===1&&!fd.target_channel){toast('Укажите целевой канал','error');return;}if(step===2&&!fd.audience_id){toast('Выберите аудиторию','error');return;}step++;update();};
    var sub=document.getElementById('wiz-submit');if(sub)sub.onclick=async function(){
      sub.disabled=true;sub.innerHTML='<span class="spin"></span> Запуск...';
      var accIds=fd.account_ids.trim().split('\n').map(function(s){return s.trim();}).filter(Boolean);

      }catch(er){toast(er.message,'error');sub.disabled=false;sub.innerHTML='\u25B6 Запустить';}
    };
  }

/* Boost drip chart helper */
function bstDripChart(cur,tgt,days){
  days=days||7;var planned=[];var actual=[];var perDay=Math.ceil(tgt/days);
  for(var i=0;i<days;i++){var p=Math.min(perDay*(i+1),tgt);planned.push(p);}
  var curves=[0.08,0.22,0.42,0.58,0.72,0.88,1.0];
  for(var i=0;i<days;i++){var a=Math.round(cur*curves[Math.min(i,curves.length-1)]);actual.push(Math.min(a,planned[i]));}
  var mx=tgt||1;
  var bars='';for(var i=0;i<days;i++){
    var ph=Math.max(4,Math.round(planned[i]/mx*70));var ah=Math.max(2,Math.round(actual[i]/mx*70));
    bars+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">'+
      '<div style="width:100%;background:rgba(59,130,246,0.2);height:'+ph+'px;border-radius:2px"></div>'+
      '<div style="width:100%;background:var(--blue-500);height:'+ah+'px;border-radius:2px"></div>'+
      '<span class="txs c-m">\u04141'+(i>0?'+'+(i):'')+'</span></div>';
  }
  return '<div style="display:flex;gap:4px;align-items:end;height:90px">'+bars+'</div>'+
    '<div class="f ac jc g3x mt2 txs c-m"><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:6px;background:rgba(59,130,246,0.2);border-radius:1px;display:inline-block"></span> \u041F\u043B\u0430\u043D</span><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:6px;background:var(--blue-500);border-radius:1px;display:inline-block"></span> \u0424\u0430\u043A\u0442</span></div>';
}

  function saveStep(){
    if(cchWizStep===1){var n=document.getElementById('ccw-name');if(n)sv.name=n.value;var c=document.getElementById('ccw-count');if(c)sv.count=parseInt(c.value)||5;}

    if(cchWizStep===5){var p=document.getElementById('ccw-pinned');if(p)sv.pinnedMsg=p.value;var w=document.getElementById('ccw-welcome');if(w)sv.welcomePost=w.value;}
  }
  function restoreStep(){
    if(cchWizStep===1){var n=document.getElementById('ccw-name');if(n)n.value=sv.name;var c=document.getElementById('ccw-count');if(c)c.value=sv.count;document.querySelectorAll('.ccw-type').forEach(function(t){t.onclick=function(){sv.chType=t.dataset.type;document.querySelectorAll('.ccw-type').forEach(function(x){x.style.borderColor='';x.classList.remove('active');});t.style.borderColor='var(--blue-500)';t.classList.add('active');};if(t.dataset.type===sv.chType){t.style.borderColor='var(--blue-500)';t.classList.add('active');}});}
    if(cchWizStep===2){var np=document.getElementById('ccw-name-pat');if(np)np.value=sv.namePat;var up=document.getElementById('ccw-user-pat');if(up)up.value=sv.userPat;}
    if(cchWizStep===3){var d=document.getElementById('ccw-desc');if(d)d.value=sv.desc;}
    if(cchWizStep===4){var a=document.getElementById('ccw-accs');if(a)a.value=sv.accIds;var m=document.getElementById('ccw-master');if(m)m.value=sv.masterAcc;}
    if(cchWizStep===5){var p=document.getElementById('ccw-pinned');if(p)p.value=sv.pinnedMsg;var w=document.getElementById('ccw-welcome');if(w)w.value=sv.welcomePost;}
  }
  function mount(){
    var old=document.getElementById('mov');if(old)old.remove();
    document.body.insertAdjacentHTML('beforeend',renderWiz());
    mBind('mov','mcl');restoreStep();

      if(cchWizStep===1){if(!document.getElementById('ccw-name').value.trim()){toast('\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043D\u0430\u0437\u0432\u0430\u043D\u0438\u0435','error');return;}}

      saveStep();cchWizStep++;mount();
    };
    var prv=document.getElementById('ccw-prev');if(prv)prv.onclick=function(){saveStep();cchWizStep--;mount();};
    var sub=document.getElementById('ccw-submit');if(sub)sub.onclick=async function(){

          if(!dirLbl)dirLbl=(t.direction||'').replace('session_to_tdata','Session \u2192 TData').replace('tdata_to_session','TData \u2192 Session').replace('tdata_to_session_json','TData \u2192 Session+JSON').replace('session_json_to_tdata','Session+JSON \u2192 TData').replace('session_to_session_json','Session \u2192 Session+JSON').replace('session_json_to_session','Session+JSON \u2192 Session')||'--';
          var statusU=(t.status||'').toUpperCase();
          return '<tr class="clk" data-cnv-id="'+t.id+'"><td class="txs c-m">'+fmtDT(t.created_at)+'</td><td class="tsm fmed">'+esc(dirLbl)+'</td><td class="fmo">'+(t.files_count||0)+'</td><td class="fmo" style="color:var(--emerald-500)">'+(t.success_count||0)+'</td><td class="fmo" style="color:var(--red-500)">'+(t.failed_count||0)+'</td><td>'+cnvBdg(t.status)+'</td><td><div class="f g1h">'+
            (statusU==='PENDING'?'<button class="btn btn-sm cnv-start" data-id="'+t.id+'">'+ic('play')+' \u0421\u0442\u0430\u0440\u0442</button>':'')+
            '<button class="btn btn-ghost btn-icon btn-danger cnv-del" data-id="'+t.id+'" title="\u0423\u0434\u0430\u043B\u0438\u0442\u044C">'+ic('trash')+'</button>'+
          '</div></td></tr>';
        }).join('')+
      '</tbody></table></div>'
      :esHtml('refresh','\u041D\u0435\u0442 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442\u043E\u0432','\u0417\u0430\u0433\u0440\u0443\u0437\u0438\u0442\u0435 \u0444\u0430\u0439\u043B\u044B \u0438 \u0437\u0430\u043F\u0443\u0441\u0442\u0438\u0442\u0435 \u043A\u043E\u043D\u0432\u0435\u0440\u0442\u0430\u0446\u0438\u044E')
    )+'</div></div>'+
  '</div>';
  /* Drop zone */
  var dropZ=document.getElementById('cnv-drop-zone'),fileInp=document.getElementById('cnv-file-input'),dropLbl=document.getElementById('cnv-drop-label'),fileListEl=document.getElementById('cnv-file-list'),subBtn=document.getElementById('cnv-submit');
  var cnvFiles=[];
  function updFileList(){if(!cnvFiles.length){fileListEl.style.display='none';subBtn.disabled=true;return;}fileListEl.style.display='';subBtn.disabled=false;fileListEl.innerHTML=cnvFiles.map(function(f,i){return '<div class="f ac jb txs" style="padding:0.25rem 0"><span class="fmed">'+esc(f.name)+'</span><span class="c-m">'+(f.size/1024).toFixed(1)+' KB</span></div>';}).join('');}
  function addFiles(fl){for(var i=0;i<fl.length;i++)cnvFiles.push(fl[i]);dropLbl.textContent=cnvFiles.length+' \u0444\u0430\u0439\u043B(\u043E\u0432) \u0432\u044B\u0431\u0440\u0430\u043D\u043E';updFileList();}
  if(dropZ){dropZ.onclick=function(){fileInp.click();};fileInp.onchange=function(){if(fileInp.files&&fileInp.files.length)addFiles(fileInp.files);};dropZ.ondragover=function(e){e.preventDefault();dropZ.style.borderColor='var(--blue-500)';};dropZ.ondragleave=function(e){e.preventDefault();dropZ.style.borderColor='';};dropZ.ondrop=function(e){e.preventDefault();dropZ.style.borderColor='';if(e.dataTransfer.files&&e.dataTransfer.files.length)addFiles(e.dataTransfer.files);};}
  if(subBtn)subBtn.onclick=async function(){
    if(!cnvFiles.length)return;subBtn.disabled=true;subBtn.innerHTML='<span class="spin"></span> \u041A\u043E\u043D\u0432\u0435\u0440\u0442\u0430\u0446\u0438\u044F...';
    var dir=document.getElementById('cnv-dir');var direction=dir?dir.value:'tdata_to_session_json';
    var opts={import_to_db:!!(document.getElementById('cnv-import')&&document.getElementById('cnv-import').checked),detect_country:!!(document.getElementById('cnv-country')&&document.getElementById('cnv-country').checked),check_connection:!!(document.getElementById('cnv-check')&&document.getElementById('cnv-check').checked),encrypt_output:!!(document.getElementById('cnv-encrypt')&&document.getElementById('cnv-encrypt').checked),delete_source:!!(document.getElementById('cnv-delete-src')&&document.getElementById('cnv-delete-src').checked)};
    var fd=new FormData();for(var i=0;i<cnvFiles.length;i++)fd.append('files',cnvFiles[i]);fd.append('direction',direction);fd.append('options',JSON.stringify(opts));
    try{
      var r=await fetch(au('/converter/tasks'),{method:'POST',headers:{'x-admin-token':S.tok||'','x-workspace-id':S.ws},body:fd});
      if(!r.ok){var d=await r.json().catch(function(){return null;});throw new Error((d&&d.error)||'Upload error: '+r.status);}
      await r.json();
      toast('\u041A\u043E\u043D\u0432\u0435\u0440\u0442\u0430\u0446\u0438\u044F \u0437\u0430\u043F\u0443\u0449\u0435\u043D\u0430','success');cnvFiles=[];cnvLoaded=false;await ldCnv();if(S.sec==='converter')rConverter(document.getElementById('mc'));
    }catch(er){toast(er.message,'error');subBtn.disabled=false;subBtn.innerHTML=ic('refresh')+' \u0417\u0430\u043F\u0443\u0441\u0442\u0438\u0442\u044C \u043A\u043E\u043D\u0432\u0435\u0440\u0442\u0430\u0446\u0438\u044E';}
  };
  var addB=el.querySelector('#cnv-add');if(addB)addB.onclick=function(){var dz=document.getElementById('cnv-drop-zone');if(dz)dz.scrollIntoView({behavior:'smooth'});};
  /* Row click -> detail */
  el.querySelectorAll('[data-cnv-id]').forEach(function(row){row.onclick=function(e){if(e.target.closest('.btn'))return;var id=row.dataset.cnvId;var item=cnvItems.find(function(t){return t.id===id||String(t.id)===id;});if(item){cnvDetail=item;rMain();}};});
  el.querySelectorAll('.cnv-start').forEach(function(b){b.onclick=async function(e){e.stopPropagation();b.disabled=true;b.innerHTML='<span class="spin"></span>';try{await ap('/converter/tasks/'+b.dataset.id+'/start');toast('\u041A\u043E\u043D\u0432\u0435\u0440\u0442\u0430\u0446\u0438\u044F \u0437\u0430\u043F\u0443\u0449\u0435\u043D\u0430','success');cnvLoaded=false;await ldCnv();if(S.sec==='converter'&&!cnvDetail)rConverter(document.getElementById('mc'));}catch(er){toast(er.message,'error');b.disabled=false;b.innerHTML=ic('play')+' \u0421\u0442\u0430\u0440\u0442';}};});
  el.querySelectorAll('.cnv-del').forEach(function(b){b.onclick=async function(e){e.stopPropagation();if(!confirm('\u0423\u0434\u0430\u043B\u0438\u0442\u044C \u0437\u0430\u0434\u0430\u0447\u0443?'))return;b.disabled=true;try{await aD('/converter/tasks/'+b.dataset.id);toast('\u0417\u0430\u0434\u0430\u0447\u0430 \u0443\u0434\u0430\u043B\u0435\u043D\u0430','success');cnvLoaded=false;await ldCnv();if(S.sec==='converter'&&!cnvDetail)rConverter(document.getElementById('mc'));}catch(er){toast(er.message,'error');b.disabled=false;}};});
}
/* Converter detail view */
function rCnvDet(el,task){
  var dirLbl=(task.input_format||'')+(task.output_format?' \u2192 '+task.output_format:'');
  if(!dirLbl)dirLbl=(task.direction||'').replace('session_to_tdata','Session \u2192 TData').replace('tdata_to_session','TData \u2192 Session').replace('tdata_to_session_json','TData \u2192 Session+JSON').replace('session_json_to_tdata','Session+JSON \u2192 TData').replace('session_to_session_json','Session \u2192 Session+JSON').replace('session_json_to_session','Session+JSON \u2192 Session')||'--';
  var fc=task.files_count||0,sc=task.success_count||0,fac=task.failed_count||0;
  /* Mock per-file results */
  var filesHtml='';
  var mockFiles=task.files||[];
  if(!mockFiles.length){
    for(var i=0;i<fc;i++){
      var ok=i<sc;
      mockFiles.push({name:'account_'+(i+1)+(task.direction&&task.direction.indexOf('tdata')===0?'.session':'.tdata.zip'),status:ok?'OK':'FAILED',error:ok?'':'\u041E\u0448\u0438\u0431\u043A\u0430 \u0447\u0442\u0435\u043D\u0438\u044F \u0444\u0430\u0439\u043B\u0430'});
    }
  }
  if(mockFiles.length){
    filesHtml='<div class="tw"><table><thead><tr><th>\u0424\u0430\u0439\u043B</th><th>\u0421\u0442\u0430\u0442\u0443\u0441</th><th>\u041E\u0448\u0438\u0431\u043A\u0430</th><th>\u0421\u043A\u0430\u0447\u0430\u0442\u044C</th></tr></thead><tbody>'+
      mockFiles.map(function(f){
        var stOk=f.status==='OK';
        return '<tr><td class="tsm fmo">'+esc(f.name)+'</td>'+
          '<td><span class="badge '+(stOk?'b-emerald':'b-red')+' b-ol">'+(stOk?'OK':'FAILED')+'</span></td>'+
          '<td class="txs c-m">'+(f.error?esc(f.error):'--')+'</td>'+
          '<td>'+(stOk?'<button class="btn btn-sm btn-ghost wip-btn">'+ic('download')+' \u0421\u043A\u0430\u0447\u0430\u0442\u044C</button>':'--')+'</td></tr>';
      }).join('')+
    '</tbody></table></div>';
  }
  el.innerHTML='<div class="sy4">'+
    '<button class="btn btn-sm btn-ghost" id="cnv-det-back">'+ic('back')+' \u041D\u0430\u0437\u0430\u0434</button>'+
    '<div class="det-hd">'+
      '<div class="det-hd-info">'+
        '<div class="f ac g2x fw"><span class="tlg fxb">\u041A\u043E\u043D\u0432\u0435\u0440\u0442\u0430\u0446\u0438\u044F</span>'+cnvBdg(task.status)+
          '<span class="badge b-blue b-ol">'+esc(dirLbl)+'</span>'+
        '</div>'+
        '<div class="txs c-m mt1">\u0421\u043E\u0437\u0434\u0430\u043D\u043E: '+fmtDT(task.created_at)+'</div>'+
      '</div>'+
    '</div>'+
    kpiHtml([
      {v:fc,l:'\u0424\u0430\u0439\u043B\u043E\u0432',bg:'rgba(59,130,246,0.12)',fg:'var(--blue-500)'},
      {v:sc,l:'\u0423\u0441\u043F\u0435\u0448\u043D\u043E',bg:'rgba(34,197,94,0.12)',fg:'var(--emerald-500)'},
      {v:fac,l:'\u041E\u0448\u0438\u0431\u043E\u043A',bg:'rgba(239,68,68,0.12)',fg:'var(--red-500)'}
    ])+
    '<div class="det-section mt4"><div class="det-section-title">\u0420\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442\u044B \u043F\u043E \u0444\u0430\u0439\u043B\u0430\u043C</div>'+
      filesHtml+
    '</div>'+
  '</div>';
  el.querySelector('#cnv-det-back').onclick=function(){cnvDetail=null;rMain();};
  el.querySelectorAll('.wip-btn').forEach(function(b){b.onclick=wipToast;});
}

/* ====================================================================
   MODAL HELPERS
   ==================================================================== */
function mBind(oid,cid){
  var ov=document.getElementById(oid);if(!ov)return;
  ov.onclick=function(e){if(e.target===ov)mClose(oid);};
  var cb=document.getElementById(cid);if(cb)cb.onclick=function(){mClose(oid);};
  function ek(e){if(e.key==='Escape'){mClose(oid);document.removeEventListener('keydown',ek);}}
  document.addEventListener('keydown',ek);
}
function mClose(oid){var o=document.getElementById(oid);if(o)o.remove();}

/* ====================================================================
   HEALTH CHECK

async function chkH(){
  try{var d=await af('/health');S.online=d.status==='ok'||d.status==='healthy';}
  catch(e){S.online=false;}
  updH();
}

/* ====================================================================
   AUTH (auto-login with dev token)
   ==================================================================== */
function initAuth(){
  S.ws=wsId()||'default';
  S.tok=localStorage.getItem('tg-admin-token')||'dev-admin-token-12345';
  localStorage.setItem('tg-admin-token',S.tok);
  showApp();
}

function showApp(){
  document.getElementById('app').classList.remove('hid');
  /* Read hash for initial section */
  var h=location.hash.replace('#','');
  if(h&&NAV.some(function(n){return n.k===h;}))S.sec=h;
  rSide();rMain();chkH();
  setInterval(chkH,15000);
  setInterval(function(){
    if(S.sec==='dashboard'){dashLoaded=false;ldDash().then(function(){if(S.sec==='dashboard')rDash(document.getElementById('mc'));});}
  },30000);
}

/* ====================================================================
   HASH NAVIGATION
   ==================================================================== */
window.onhashchange=function(){
  var h=location.hash.replace('#','');
  if(h&&NAV.some(function(n){return n.k===h;})&&h!==S.sec){
    S.sec=h;S.accDetail=null;bstDetail=null;sbstDetail=null;clnDetail=null;cchDetail=null;cnvDetail=null;rSide();rMain();
  }
};
