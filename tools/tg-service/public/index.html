  var h='<div class="dlg-ov" id="mov"><div class="dlg dlg-xl"><div class="dlg-hd"><div class="dlg-tt">🤖 Монитор агента</div></div><div class="dlg-bd"><div id="agent-mon-box"></div></div><div class="dlg-ft"><button class="btn btn-sm" id="mcl">Закрыть</button></div></div></div>';

  function saveStep(){
    switch(step){
      case 1: var n=document.getElementById('wiz-name');if(n)fd.name=n.value.trim();var ni=document.getElementById('wiz-niche');if(ni)fd.niche=ni.value.trim();break;
      case 2: var a=document.getElementById('wiz-account');if(a)fd.account_id=a.value;break;
      case 3: var m=document.getElementById('wiz-model');if(m)fd.ai_model=m.value;break;
      case 4: var b=document.getElementById('wiz-bio');if(b)fd.bio=b.value.trim();var p=document.getElementById('wiz-personality');if(p)fd.personality=p.value.trim();break;
      case 5: var pr=document.getElementById('wiz-prompt');if(pr)fd.system_prompt=pr.value.trim();break;
      case 6: var ch=document.getElementById('wiz-channels');if(ch)fd.target_channels=ch.value;break;
    }
  }

  function show(){
    var h='<div class="dlg-ov" id="mov"><div class="dlg dlg-xl"><div class="dlg-hd"><div class="dlg-tt">'+ic('plus')+' Создать персону &mdash; шаг '+step+' из '+maxStep+'</div></div><div class="dlg-bd" id="wiz-content">'+renderWizard()+'</div></div></div>';
    document.body.insertAdjacentHTML('beforeend',h);
    bind();
  }

  function update(){
    var c=document.getElementById('wiz-content');if(!c)return;
    c.innerHTML=renderWizard();
    bind();
  }

  function bind(){
    var ov=document.getElementById('mov');if(!ov)return;
    ov.onclick=function(e){if(e.target===ov)mClose('mov');};
    var cl=document.getElementById('mcl');if(cl)cl.onclick=function(){mClose('mov');};
    function ek(e){if(e.key==='Escape'){mClose('mov');document.removeEventListener('keydown',ek);}}
    document.addEventListener('keydown',ek);
    var prev=document.getElementById('wiz-prev');if(prev)prev.onclick=function(){saveStep();step--;update();};
    var next=document.getElementById('wiz-next');if(next)next.onclick=function(){saveStep();if(step===1&&!fd.name){toast('Введите имя персоны','error');return;}step++;update();};
    var sub=document.getElementById('wiz-submit');if(sub)sub.onclick=async function(){
      sub.disabled=true;sub.innerHTML='<span class="spin"></span> Создание...';
      var channels=fd.target_channels.split('\n').map(function(s){return s.trim();}).filter(Boolean);
      try{
        await ap('/ai-promoter/personas',{name:fd.name,account_ids:fd.account_id?[fd.account_id]:[],niche:fd.niche,bio:fd.bio,personality:fd.personality,strategy:fd.strategy,system_prompt:fd.system_prompt,ai_model:fd.ai_model,target_channels:channels});

    };
    document.querySelectorAll('.wiz-strat').forEach(function(card){
      card.onclick=function(){fd.strategy=card.dataset.val;update();};
    });
  }

  show();
}

/* ── 9b. База знаний (Knowledge Base) ── */
var kbLoaded=false,kbItems=[],kbTotal=0,kbExpanded={};
var kbConflicts=[],kbConflictCount=0;
async function ldKb(){try{var r=await af('/kb/documents');kbItems=r.items||[];kbTotal=r.total!=null?r.total:kbItems.length;kbLoaded=true;}catch(e){toast('Ошибка загрузки базы знаний: '+e.message,'error');kbLoaded=true;}}
// fetch open conflicts (duplicate/contradiction); silent on error so the docs list still renders
async function ldKbConflicts(){try{var r=await af('/kb/conflicts');kbConflicts=r.items||[];kbConflictCount=r.count!=null?r.count:kbConflicts.length;}catch(e){kbConflicts=[];kbConflictCount=0;}}
// Russian plural: picks one/few/many form by count (1 расхождение / 2 расхождения / 5 расхождений)
function kbPlural(n,one,few,many){var m10=n%10,m100=n%100;if(m10===1&&m100!==11)return one;if(m10>=2&&m10<=4&&(m100<10||m100>=20))return few;return many;}
function rKb(el){
  if(!kbLoaded){el.innerHTML='<div class="sy4">'+skel('3rem')+skel('2.5rem')+skel('24rem')+'</div>';Promise.all([ldKb(),ldKbConflicts()]).then(function(){if(S.sec==='knowledge-base')rKb(el);});return;}
  // ── split crawled pages (grouped by site) from flat file uploads ──
  var sites={},siteOrder=[],files=[];
  kbItems.forEach(function(d){
    var md=d.metadata||{};
    if(md.source==='crawl'){
      var site=md.site||'(сайт)';
      if(!sites[site]){sites[site]={key:site,pages:[]};siteOrder.push(site);}
      sites[site].pages.push(d);
    }else{
      files.push(d);
    }
  });
  var subParts=[];
  if(siteOrder.length>0)subParts.push(siteOrder.length+' сайтов');
  if(files.length>0)subParts.push(files.length+' файлов');
  var subTxt=subParts.length>0?subParts.join(' · '):(kbTotal+' документов');
  // build rows: per-site parent + (expanded) child pages, then flat file rows
  var rows='';
  siteOrder.forEach(function(site){
    var grp=sites[site];var open=!!kbExpanded[site];var chev=open?'▾':'▸';
    rows+='<tr class="kb-site-row" data-site="'+esc(site)+'" style="cursor:pointer">'+
      '<td class="fmed"><span class="kb-chev" style="display:inline-block;width:1.1em;color:var(--muted-text)">'+chev+'</span>🌐 '+esc(site)+'</td>'+
      '<td><span class="badge b-blue b-ol">'+grp.pages.length+' страниц</span></td>'+
      '<td class="txs c-m">'+fmtDT(grp.pages[0]&&grp.pages[0].created_at)+'</td>'+
      '<td><button class="btn btn-ghost btn-icon kb-site-edit" data-site="'+esc(site)+'" title="Переименовать сайт">✏️</button><button class="btn btn-ghost btn-icon btn-danger kb-site-del" data-site="'+esc(site)+'" title="Удалить весь сайт">'+ic('trash')+'</button></td></tr>';
    grp.pages.forEach(function(d){
      var md=d.metadata||{};var path='';try{if(md.url)path=new URL(md.url).pathname||'/';}catch(e){path=md.url||'';}
      rows+='<tr class="kb-row kb-child"'+(open?'':' style="display:none"')+' data-id="'+esc(d.id)+'" style="cursor:pointer">'+
        '<td><div style="padding-left:1.6rem"><span class="fmed">'+esc(d.title||path||'--')+'</span>'+(path?'<div class="txs c-m" style="margin-top:1px">'+esc(path)+'</div>':'')+'</div></td>'+
        '<td><span class="badge b-blue b-ol">'+(d.chunks_count!=null?d.chunks_count:0)+'</span></td>'+
        '<td class="txs c-m">'+fmtDT(d.created_at)+'</td>'+
        '<td><button class="btn btn-ghost btn-icon kb-edit" data-id="'+esc(d.id)+'" data-title="'+esc(d.title||'')+'" title="Переименовать">✏️</button><button class="btn btn-ghost btn-icon btn-danger kb-del" data-id="'+esc(d.id)+'" title="Удалить">'+ic('trash')+'</button></td></tr>';
    });
  });
  files.forEach(function(d){
    rows+='<tr class="kb-row" data-id="'+esc(d.id)+'" style="cursor:pointer"><td class="fmed">'+esc(d.title||'--')+'</td><td><span class="badge b-blue b-ol">'+(d.chunks_count!=null?d.chunks_count:0)+'</span></td><td class="txs c-m">'+fmtDT(d.created_at)+'</td><td><button class="btn btn-ghost btn-icon kb-edit" data-id="'+esc(d.id)+'" data-title="'+esc(d.title||'')+'" title="Переименовать">✏️</button><button class="btn btn-ghost btn-icon btn-danger kb-del" data-id="'+esc(d.id)+'" title="Удалить">'+ic('trash')+'</button></td></tr>';
  });
  // amber/red banner shown when the base has open conflicts (duplicates/contradictions)
  var banner=kbConflictCount>0
    ?'<div id="kb-conf-banner" class="card" style="border-color:var(--amber-500,#f59e0b);background:rgba(245,158,11,0.1)"><div class="card-body f ac jb" style="gap:0.75rem;align-items:center;padding:0.85rem 1.1rem">'+
       '<div class="f ac g2x" style="min-width:0;align-items:center"><span style="font-size:1.1rem;line-height:1">⚠</span><span class="fmed">Найдено '+kbConflictCount+' '+kbPlural(kbConflictCount,'расхождение','расхождения','расхождений')+' в базе знаний</span></div>'+
       '<button class="btn btn-sm btn-primary" id="kb-conf-view">Посмотреть</button>'+
     '</div></div>'
    :'';
  el.innerHTML='<div class="sy4">'+
    pageHead('База знаний',subTxt,'<button class="btn btn-sm" id="kb-chat" style="border-color:var(--emerald-500);color:var(--emerald-500)">💬 Чат</button><button class="btn btn-sm" id="kb-check">🔍 Проверить базу</button><button class="btn btn-sm" id="kb-selftest">🧪 Самопроверка</button><button class="btn btn-sm" id="kb-selftest-history">📋 История проверок</button><button class="btn btn-sm btn-primary" id="kb-add">'+ic('plus')+' Добавить документ</button>')+
    banner+
    '<div class="card"><div class="card-body flush">'+
    (kbItems.length>0
      ?'<div class="tw"><table><thead><tr><th>Документ</th><th>Чанков</th><th>Добавлен</th><th>Действия</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
      :esHtml('file','Нет документов','Загрузите файлы (TXT, MD, PDF, DOCX), чтобы AI-агенты использовали их как контекст',
        '<button class="btn btn-sm btn-primary" id="kb-add2">'+ic('plus')+' Добавить документ</button>')
    )+'</div></div>'+
  '</div>';
  var addB=el.querySelector('#kb-add');if(addB)addB.onclick=function(){mKbAdd();};
  var addB2=el.querySelector('#kb-add2');if(addB2)addB2.onclick=function(){mKbAdd();};
  var checkB=el.querySelector('#kb-check');if(checkB)checkB.onclick=function(){kbCheckBase(checkB);};
  var selfB=el.querySelector('#kb-selftest');if(selfB)selfB.onclick=function(){mKbSelfTest();};
  var selfHistB=el.querySelector('#kb-selftest-history');if(selfHistB)selfHistB.onclick=function(){mKbSelfTestHistory();};
  var chatB=el.querySelector('#kb-chat');if(chatB)chatB.onclick=function(){mKbChat();};
  var confViewB=el.querySelector('#kb-conf-view');if(confViewB)confViewB.onclick=function(){mKbConflicts();};
  // expand/collapse a site: toggle its child rows' visibility + chevron, persist in kbExpanded
  el.querySelectorAll('.kb-site-row').forEach(function(r){r.onclick=function(){
    var site=r.dataset.site;var open=!kbExpanded[site];kbExpanded[site]=open;
    var chev=r.querySelector('.kb-chev');if(chev)chev.textContent=open?'▾':'▸';
    var nx=r.nextElementSibling;
    while(nx&&nx.classList.contains('kb-child')){nx.style.display=open?'':'none';nx=nx.nextElementSibling;}
  };});
  // click a document row (file or crawled page) → content preview modal
  el.querySelectorAll('.kb-row').forEach(function(r){r.onclick=function(){mKbView(r.dataset.id);};});
  // per-document delete (stopPropagation so row/site click doesn't fire)
  el.querySelectorAll('.kb-del').forEach(function(b){b.onclick=async function(ev){ev.stopPropagation();if(!confirm('Удалить документ?'))return;b.disabled=true;try{await aD('/kb/documents/'+b.dataset.id);toast('Документ удалён','success');kbLoaded=false;await ldKb();if(S.sec==='knowledge-base')rKb(document.getElementById('mc'));}catch(e){toast(e.message,'error');b.disabled=false;}};});
  // delete whole site = loop DELETE over its child docs, then refresh
  el.querySelectorAll('.kb-site-del').forEach(function(b){b.onclick=async function(ev){ev.stopPropagation();var site=b.dataset.site;var grp=sites[site];if(!grp)return;if(!confirm('Удалить весь сайт «'+site+'» ('+grp.pages.length+' страниц)?'))return;b.disabled=true;try{for(var i=0;i<grp.pages.length;i++){await aD('/kb/documents/'+grp.pages[i].id);}toast('Сайт удалён ('+grp.pages.length+' страниц)','success');delete kbExpanded[site];kbLoaded=false;await ldKb();if(S.sec==='knowledge-base')rKb(document.getElementById('mc'));}catch(e){toast(e.message,'error');b.disabled=false;}};});

// ── content preview modal: fetch full collected text for a document ──
// ── build esc()'d HTML for the doc content, wrapping `highlight` (or its first-words prefix) in <mark> ──
// tolerant match: exact substring first, then fall back to the first ~7 words; case-insensitive, ws-normalized.
// Security: we esc() the raw content first, then inject <mark> by slicing the ESC'd string — never raw HTML.
function kbMarkContent(txt,highlight){
  var escTxt=esc(txt);
  var hl=highlight!=null?String(highlight).trim():'';
  if(!hl)return escTxt;
  // collapse runs of whitespace for matching (but keep original chars for slicing)
  function norm(s){return s.replace(/\s+/g,' ').toLowerCase();}
  // find [start,end) byte-range in the RAW txt that matches `needle` (ws-normalized, case-insensitive)
  function findRange(needle){
    if(!needle)return null;
    var nNeedle=norm(needle).trim();if(!nNeedle)return null;
    // map each char of txt to a normalized form, tracking original indices
    var map=[],nbuf='',prevSpace=false;
    for(var i=0;i<txt.length;i++){
      var ch=txt[i];
      if(/\s/.test(ch)){if(prevSpace)continue;nbuf+=' ';map.push(i);prevSpace=true;}
      else{nbuf+=ch.toLowerCase();map.push(i);prevSpace=false;}
    }
    var pos=nbuf.indexOf(nNeedle);
    if(pos<0)return null;
    var start=map[pos];
    var endNorm=pos+nNeedle.length-1; // last normalized char index
    if(endNorm>=map.length)endNorm=map.length-1;
    var end=map[endNorm]+1; // exclusive in raw txt
    return [start,end];
  }
  // try full quote, then progressively shorter first-words prefix (8→6 words)
  var range=findRange(hl);
  if(!range){
    var words=hl.split(/\s+/);
    for(var w=Math.min(8,words.length);w>=6&&!range;w--){
      range=findRange(words.slice(0,w).join(' '));
    }
  }
  if(!range)return escTxt;
  // re-esc() the three raw slices so offsets stay correct after escaping
  return esc(txt.slice(0,range[0]))+'<mark class="kb-diff" id="mkv-hl">'+esc(txt.slice(range[0],range[1]))+'</mark>'+esc(txt.slice(range[1]));
}

// ── word-level diff: highlight tokens in A absent from B and vice-versa (set-diff, no libs) ──
// returns esc()'d HTML; tokens are split on whitespace, compared by lowercased core (punctuation stripped)
function kbWordDiff(a,b){
  function tokenize(s){return String(s||'').split(/(\s+)/);} // keep whitespace chunks to preserve layout
  function core(t){return t.toLowerCase().replace(/[.,!?;:"'«»()\[\]{}…—–-]/g,'');}
  function buildSet(s){var set={};tokenize(s).forEach(function(t){var c=core(t);if(c)set[c]=1;});return set;}
  var setA=buildSet(a),setB=buildSet(b);
  function render(s,otherSet){
    return tokenize(s).map(function(t){
      if(/^\s+$/.test(t)||t==='')return esc(t);
      var c=core(t);
      if(c&&!otherSet[c])return '<mark class="kb-diff">'+esc(t)+'</mark>';
      return esc(t);
    }).join('');
  }
  return {a:render(a,setB),b:render(b,setA)};
}

  var pollTimer=null,polls=0;
  function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}
  var h='<div class="dlg-ov" id="mkst"><div class="dlg dlg-xl"><div class="dlg-hd"><div class="dlg-tt">🧪 Самопроверка базы знаний</div></div>'+
    '<div class="dlg-bd sy3">'+
      '<div class="f ac jb" style="gap:0.5rem;flex-wrap:wrap">'+
        '<div class="txs c-m" style="flex:1;min-width:12rem">Агент задаёт базе типовые вопросы и проверяет, на что она может ответить.</div>'+
        '<button class="btn btn-sm btn-primary" id="mkst-run">Запустить самопроверку</button>'+
      '</div>'+
      '<div id="mkst-status" class="txs c-m"></div>'+
      '<div id="mkst-body"></div>'+
    '</div>'+
    '<div class="dlg-ft"><button type="button" class="btn btn-sm" id="mkst-cl">Закрыть</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
  // mBind binds overlay+close; wrap close button to also stop polling (no leaked interval)
  mBind('mkst','mkst-cl');
  var ov=document.getElementById('mkst');if(ov)ov.onclick=function(e){if(e.target===ov){stopPoll();mClose('mkst');}};
  var clB=document.getElementById('mkst-cl');if(clB)clB.onclick=function(){stopPoll();mClose('mkst');};

  var runB=document.getElementById('mkst-run'),statusEl=document.getElementById('mkst-status'),bodyEl=document.getElementById('mkst-body');
  function setStatus(html){if(statusEl)statusEl.innerHTML=html;}
  function alive(){return !!document.getElementById('mkst');}

  // render a finished run (DONE/FAILED) or in-progress placeholder
  function render(r){
    if(!alive())return;
    if(!r){setStatus('');bodyEl.innerHTML='<div class="txs c-m" style="text-align:center;padding:1.5rem">Самопроверка ещё не запускалась.</div>';return;}
    var st=r.status;
    if(st==='PENDING'||st==='RUNNING'){
      setStatus('<span class="spin"></span> '+(st==='PENDING'?'В очереди…':'Проверка идёт…'));
      if(runB)runB.disabled=true;
      return;
    }
    if(runB)runB.disabled=false;
    if(st==='FAILED'){
      setStatus('<span class="badge b-red">Ошибка</span>');
      bodyEl.innerHTML='<div class="txs c-rd" style="white-space:pre-wrap;word-break:break-word;border:1px solid var(--border);border-radius:var(--radius-md);padding:0.75rem">'+esc(r.error||'Неизвестная ошибка')+'</div>';
      return;
    }
    if(st==='DONE'){
      var total=r.total!=null?r.total:((r.results||[]).length);
      var answered=r.answered!=null?r.answered:(r.results||[]).filter(function(x){return x.answered;}).length;
      var gaps=r.gaps!=null?r.gaps:(total-answered);
      setStatus('<span class="badge b-emerald">База отвечает на '+answered+' из '+total+'</span>'+(gaps>0?' <span class="badge b-red">Пробелов: '+gaps+'</span>':''));
      var html='';
      if(r.summary)html+='<div class="txs" style="white-space:pre-wrap;word-break:break-word;background:var(--muted-bg,var(--bg-2));border:1px solid var(--border);border-radius:var(--radius-md);padding:0.6rem 0.7rem;margin-bottom:0.6rem">'+esc(r.summary)+'</div>';
      var results=r.results||[];
      if(!results.length){html+='<div class="txs c-m" style="text-align:center;padding:1rem">Нет результатов.</div>';}
      else{
        html+=results.map(function(it){
          var ok=!!it.answered;
          var badge=ok?'<span class="badge b-emerald">✓</span>':'<span class="badge b-red">✗</span>';
          var accent=ok?'var(--border)':'var(--red-500)';
          var ansHtml=it.answer?'<details style="margin-top:0.35rem"><summary class="txs c-m" style="cursor:pointer">Ответ</summary><div class="txs" style="white-space:pre-wrap;word-break:break-word;margin-top:0.25rem;line-height:1.5">'+esc(it.answer)+'</div></details>':'';
          var verdict=it.verdict?'<div class="txs '+(ok?'c-m':'c-rd')+'" style="margin-top:0.2rem">'+esc(it.verdict)+'</div>':'';
          return '<div class="card" style="margin-bottom:0.5rem;border-left:3px solid '+accent+'"><div class="card-body sy3" style="padding:0.6rem 0.75rem">'+
            '<div class="f" style="gap:0.5rem;align-items:flex-start">'+badge+'<div style="flex:1;min-width:0"><div class="txs fmed" style="word-break:break-word">'+esc(it.question||'--')+'</div>'+verdict+ansHtml+'</div></div>'+
          '</div></div>';
        }).join('');
      }
      bodyEl.innerHTML=html;
      return;
    }
    // unknown status → show raw
    setStatus(esc(String(st||'')));
  }

  function poll(){
    if(!alive()){stopPoll();return;}
    polls++;
    if(polls>60){stopPoll();setStatus('<span class="badge b-amber">Превышено время ожидания</span>');if(runB)runB.disabled=false;return;}
    af('/kb/self-test/latest').then(function(r){
      if(!alive()){stopPoll();return;}
      render(r);
      if(r&&(r.status==='DONE'||r.status==='FAILED'))stopPoll();
    }).catch(function(e){
      if(!alive()){stopPoll();return;}
      stopPoll();setStatus('<span class="badge b-red">Ошибка опроса: '+esc(e.message)+'</span>');if(runB)runB.disabled=false;
    });
  }

  runB.onclick=async function(){
    runB.disabled=true;setStatus('<span class="spin"></span> Запуск…');bodyEl.innerHTML='';
    try{
      await ap('/kb/self-test',{});
      toast('Самопроверка запущена…','success');
      setStatus('<span class="spin"></span> Проверка идёт…');
      stopPoll();polls=0;pollTimer=setInterval(poll,2500);poll();
    }catch(e){
      toast(e.message,'error');setStatus('<span class="badge b-red">'+esc(e.message)+'</span>');runB.disabled=false;
    }
  };

  // on open: load last run (persists results between opens); resume polling if still running
  af('/kb/self-test/latest').then(function(r){
    if(!alive())return;
    render(r);
    if(r&&(r.status==='PENDING'||r.status==='RUNNING')){stopPoll();polls=0;pollTimer=setInterval(poll,2500);}
  }).catch(function(){
    if(alive())render(null);
  });
}
// reusable result-card renderer (same style as mKbSelfTest results) for a finished run's results array
function kbSelfTestResultsHtml(results){
  results=results||[];
  if(!results.length)return '<div class="txs c-m" style="text-align:center;padding:1rem">Нет результатов.</div>';
  return results.map(function(it){
    var ok=!!it.answered;
    var badge=ok?'<span class="badge b-emerald">✓</span>':'<span class="badge b-red">✗</span>';
    var accent=ok?'var(--border)':'var(--red-500)';
    var ansHtml=it.answer?'<details style="margin-top:0.35rem"><summary class="txs c-m" style="cursor:pointer">Ответ</summary><div class="txs" style="white-space:pre-wrap;word-break:break-word;margin-top:0.25rem;line-height:1.5">'+esc(it.answer)+'</div></details>':'';
    var verdict=it.verdict?'<div class="txs '+(ok?'c-m':'c-rd')+'" style="margin-top:0.2rem">'+esc(it.verdict)+'</div>':'';
    return '<div class="card" style="margin-bottom:0.5rem;border-left:3px solid '+accent+'"><div class="card-body sy3" style="padding:0.6rem 0.75rem">'+
      '<div class="f" style="gap:0.5rem;align-items:flex-start">'+badge+'<div style="flex:1;min-width:0"><div class="txs fmed" style="word-break:break-word">'+esc(it.question||'--')+'</div>'+verdict+ansHtml+'</div></div>'+
    '</div></div>';
  }).join('');
}
function mKbSelfTestHistory(){
  var h='<div class="dlg-ov" id="mksth"><div class="dlg dlg-xl"><div class="dlg-hd"><div class="dlg-tt">📋 История самопроверок</div></div>'+
    '<div class="dlg-bd sy3"><div id="mksth-body"><div class="txs c-m" style="text-align:center;padding:1.5rem"><span class="spin"></span> Загрузка…</div></div></div>'+
    '<div class="dlg-ft"><button type="button" class="btn btn-sm" id="mksth-cl">Закрыть</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
  mBind('mksth','mksth-cl');
  function alive(){return !!document.getElementById('mksth');}
  function bodyEl(){return document.getElementById('mksth-body');}
  // badge for a run: green if all answered, amber if gaps, red if FAILED
  function runBadge(r){
    if(r.status==='FAILED')return '<span class="badge b-red">FAILED</span>';
    var total=r.total!=null?r.total:0;
    var answered=r.answered!=null?r.answered:0;
    var gaps=r.gaps!=null?r.gaps:(total-answered);
    var cls=gaps>0?'b-amber':'b-emerald';
    return '<span class="badge '+cls+'">'+answered+' из '+total+'</span>';
  }
  function showList(){
    if(!alive())return;
    bodyEl().innerHTML='<div class="txs c-m" style="text-align:center;padding:1.5rem"><span class="spin"></span> Загрузка…</div>';
    af('/kb/self-test/history').then(function(d){
      if(!alive())return;
      var items=(d&&d.items)||[];
      if(!items.length){bodyEl().innerHTML='<div class="txs c-m" style="text-align:center;padding:1.5rem">Проверок ещё не было.</div>';return;}
      var html=items.map(function(r){
        var summary=r.summary?'<div class="txs c-m" style="margin-top:0.25rem;word-break:break-word">'+esc(r.summary)+'</div>':'';
        return '<div class="card mksth-run" data-id="'+esc(r.id)+'" style="margin-bottom:0.5rem;cursor:pointer"><div class="card-body" style="padding:0.6rem 0.75rem">'+
          '<div class="f ac jb" style="gap:0.5rem"><span class="txs fmed">'+fmtDT(r.created_at)+'</span>'+runBadge(r)+'</div>'+summary+
        '</div></div>';
      }).join('');
      bodyEl().innerHTML=html;
      bodyEl().querySelectorAll('.mksth-run').forEach(function(row){row.onclick=function(){showDetail(row.dataset.id);};});
    }).catch(function(e){
      if(!alive())return;
      bodyEl().innerHTML='<div class="txs c-rd" style="text-align:center;padding:1.5rem">Ошибка: '+esc(e.message)+'</div>';
    });
  }
  function showDetail(id){
    if(!alive())return;
    bodyEl().innerHTML='<div class="txs c-m" style="text-align:center;padding:1.5rem"><span class="spin"></span> Загрузка…</div>';
    af('/kb/self-test/'+encodeURIComponent(id)).then(function(r){
      if(!alive())return;
      var back='<button class="btn btn-sm" id="mksth-back" style="margin-bottom:0.6rem">← Назад к списку</button>';
      var head;
      if(r.status==='FAILED'){
        head='<div style="margin-bottom:0.6rem"><span class="badge b-red">Ошибка</span></div>'+
          '<div class="txs c-rd" style="white-space:pre-wrap;word-break:break-word;border:1px solid var(--border);border-radius:var(--radius-md);padding:0.75rem">'+esc(r.error||'Неизвестная ошибка')+'</div>';
        bodyEl().innerHTML=back+head;
      }else{
        var total=r.total!=null?r.total:((r.results||[]).length);
        var answered=r.answered!=null?r.answered:(r.results||[]).filter(function(x){return x.answered;}).length;
        var gaps=r.gaps!=null?r.gaps:(total-answered);
        head='<div style="margin-bottom:0.6rem"><span class="badge b-emerald">База отвечает на '+answered+' из '+total+'</span>'+(gaps>0?' <span class="badge b-red">Пробелов: '+gaps+'</span>':'')+'</div>';
        var sumHtml=r.summary?'<div class="txs" style="white-space:pre-wrap;word-break:break-word;background:var(--muted-bg,var(--bg-2));border:1px solid var(--border);border-radius:var(--radius-md);padding:0.6rem 0.7rem;margin-bottom:0.6rem">'+esc(r.summary)+'</div>':'';
        bodyEl().innerHTML=back+head+sumHtml+kbSelfTestResultsHtml(r.results);
      }
      var backB=document.getElementById('mksth-back');if(backB)backB.onclick=function(){showList();};
    }).catch(function(e){
      if(!alive())return;
      var back='<button class="btn btn-sm" id="mksth-back" style="margin-bottom:0.6rem">← Назад к списку</button>';
      bodyEl().innerHTML=back+'<div class="txs c-rd" style="text-align:center;padding:1.5rem">Ошибка: '+esc(e.message)+'</div>';
      var backB=document.getElementById('mksth-back');if(backB)backB.onclick=function(){showList();};
    });
  }
  showList();
}

          setProg('Ошибка: '+esc(pe.message),true);
          sb.disabled=false;sb.innerHTML='Считать сайт';
        }
      },2000);
    }catch(er){toast(er.message,'error');setProg('Ошибка: '+esc(er.message),true);sb.disabled=false;sb.innerHTML='Считать сайт';}
  };
}

      '</tbody></table></div></div></div>':'')+
  '</div>';
  el.querySelectorAll('.jc-acc').forEach(function(c){c.onchange=function(){jcSel[c.value]=c.checked;};});
  el.querySelectorAll('.jc-verify').forEach(function(b){b.onclick=async function(){var id=b.dataset.id;b.disabled=true;var old=b.innerHTML;b.innerHTML='<span class="spin"></span>';try{var t=await af('/join-chats/'+id);await verifyMembershipUI(t.account_ids||[],t.target_chats||[],t.name||'Проверка членства');}catch(e){toast(e.message,'error');}b.disabled=false;b.innerHTML=old;};});
  el.querySelector('#jc-run').onclick=async function(){
    var chats=document.getElementById('jc-chats').value.split('\n').map(function(s){return s.trim();}).filter(Boolean);
    if(!chats.length){toast('Укажите целевые чаты','error');return;}
    var accIds=selIds(jcSel);
    if(!accIds.length){toast('Выберите хотя бы один аккаунт','error');return;}
    var mn=parseInt(document.getElementById('jc-min').value)||30,mx=parseInt(document.getElementById('jc-max').value)||120;
    if(mn>mx){toast('Мин интервал не может быть больше макс','error');return;}
    var b=this;b.disabled=true;b.innerHTML='<span class="spin"></span> Запуск...';
    /* Join with humanity-gate: backend returns 409 LOW_HUMANITY for "naked"
       accounts; we list them and let the operator confirm (force) or cancel. */
    async function doJoin(force){
      var r=await fetch(au('/join-chats'),{method:'POST',headers:ah(),body:JSON.stringify({target_chats:chats,account_ids:accIds,join_interval_min:mn,join_interval_max:mx,force_low_humanity:!!force})});
      if(r.status===409){
        var d=await r.json().catch(function(){return null;});
        var det=d&&d.detail;
        if(det&&det.code==='LOW_HUMANITY'){
          var choice=await jcRiskGateModal(det);
          if(choice==='force')return doJoin(true);
          if(choice==='warmup'){
            var wids=(det.risky||[]).filter(function(x){return x.can_warmup;}).map(function(x){return x.account_id;});
            var ok=0;for(var i=0;i<wids.length;i++){try{await ap('/warmup/'+wids[i]+'/start');ok++;}catch(e){}}
            toast('🔥 Прогрев запущен для '+ok+' аккаунт(ов). Вступите позже, когда прогреются.','success');
          }
          var e=new Error('__cancelled__');e.cancelled=true;throw e;
        }
      }
      if(!r.ok){var de=await r.json().catch(function(){return null;});throw new Error(apiErr(de,r.status));}
      return r.json();
    }
    try{
      var r=await doJoin(false);
      jcLastTask=r.id||r.task_id||null;
      toast('Задача запущена (ID: '+(jcLastTask||'--')+')','success');
      jcSel={};jcLoaded=false;await ldJc();if(S.sec==='join-chats')rJoinChats(document.getElementById('mc'));
      if(jcLastTask)jcRenderStatus(jcLastTask);
    }catch(er){if(!er.cancelled)toast(er.message,'error');b.disabled=false;b.innerHTML=ic('play')+' Запустить';}
  };
  if(jcLastTask)jcRenderStatus(jcLastTask);
}
/* Pre-join risk gate modal (humanity + warmup). Resolves 'warmup'|'force'|'cancel'. */
function jcRiskGateModal(det){
  return new Promise(function(resolve){
    var risky=(det&&det.risky)||[];
    var rows=risky.map(function(x){
      var miss=(x.missing||[]).join(', ')||(x.reason||'риск');
      return '<div class="f ac jb" style="padding:.35rem 0;border-bottom:1px solid var(--border)"><span class="txs" style="font-weight:600">'+esc(x.account||'?')+'</span><span class="txs c-m" style="text-align:right">'+esc(miss)+'</span></div>';
    }).join('');
    var canWarm=risky.some(function(x){return x.can_warmup;});
    var warmBtn=canWarm?'<button type="button" class="btn btn-sm" id="rg-warm">🔥 Прогреть сначала</button>':'';
    var h='<div class="dlg-ov" id="rgov"><div class="dlg" style="max-width:480px"><div class="dlg-hd"><div class="dlg-tt">⚠️ Риск авто-бана при вступлении</div></div><div class="dlg-bd sy3">'+
      '<div class="txs">'+esc((det&&det.message)||'')+'</div>'+
      '<div style="max-height:240px;overflow:auto;border:1px solid var(--border);border-radius:8px;padding:0 .6rem">'+rows+'</div>'+
      '<div class="txs c-m">Рекомендуется прогреть аккаунт и заполнить профиль (аватар + username) перед вступлением в публичные чаты.</div>'+
    '</div><div class="dlg-ft">'+warmBtn+'<button type="button" class="btn btn-sm" id="rg-cancel">Отмена</button><button type="button" class="btn btn-sm btn-primary" id="rg-force">Всё равно вступить</button></div></div></div>';
    document.body.insertAdjacentHTML('beforeend',h);
    function done(choice){mClose('rgov');document.removeEventListener('keydown',ek);resolve(choice);}
    var ov=document.getElementById('rgov');ov.onclick=function(e){if(e.target===ov)done('cancel');};
    var c=document.getElementById('rg-cancel');if(c)c.onclick=function(){done('cancel');};
    var f=document.getElementById('rg-force');if(f)f.onclick=function(){done('force');};
    var w=document.getElementById('rg-warm');if(w)w.onclick=function(){done('warmup');};
    function ek(e){if(e.key==='Escape')done('cancel');}
    document.addEventListener('keydown',ek);
  });
}

      case 3: bodyHtml+='<div><label class="lbl">Режим комментирования'+tip('AI \u2014 генерация через Claude, Templates \u2014 из шаблонов, Mixed \u2014 чередование')+'</label><div class="g g3 mt2">'+modes.map(function(m){var cls=fd.mode===m?'border-color:var(--blue-500);background:rgba(59,130,246,0.05)':'';return '<div class="card card-hv ncwiz-mode" data-val="'+m+'" style="cursor:pointer;padding:1rem;text-align:center;'+cls+'"><div class="tsm fbol">'+esc(m)+'</div><div class="txs c-m mt1">'+esc(modeDesc[m]||m)+'</div></div>';}).join('')+'</div></div><div class="mt3"><label class="lbl">AI Модель</label><div class="sel-w"><select class="sel" id="wiz-model">'+models.map(function(m){return '<option value="'+m+'"'+(fd.ai_model===m?' selected':'')+'>'+esc(m)+'</option>';}).join('')+'</select></div></div><div class="g g2 mt3"><div><label class="lbl">Задержка мин. (сек)'+tip('Минимальная пауза между комментариями (секунды)')+'</label><input class="input tsm" type="number" id="wiz-dmin" value="'+fd.delay_min+'"></div><div><label class="lbl">Задержка макс. (сек)'+tip('Максимальная пауза между комментариями (секунды)')+'</label><input class="input tsm" type="number" id="wiz-dmax" value="'+fd.delay_max+'"></div></div>';break;

  function saveStep(){
    switch(step){
      case 1:var n=document.getElementById('wiz-name');if(n)fd.name=n.value.trim();var kw=document.getElementById('wiz-keywords');if(kw)fd.keywords=kw.value.trim();break;
      case 2:var ch=document.getElementById('wiz-channels');if(ch)fd.target_channels=ch.value;break;
      case 3:var m=document.getElementById('wiz-model');if(m)fd.ai_model=m.value;var dm=document.getElementById('wiz-dmin');if(dm)fd.delay_min=parseInt(dm.value)||60;var dx=document.getElementById('wiz-dmax');if(dx)fd.delay_max=parseInt(dx.value)||300;break;

  function update(){var c=document.getElementById('wiz-content');if(!c)return;c.innerHTML=renderWizard();bind();}
  function bind(){

    ov.onclick=function(e){if(e.target===ov)mClose('mov');};
    var cl=document.getElementById('mcl');if(cl)cl.onclick=function(){mClose('mov');};

    var prev=document.getElementById('wiz-prev');if(prev)prev.onclick=function(){saveStep();step--;update();};
    var next=document.getElementById('wiz-next');if(next)next.onclick=function(){saveStep();if(step===1&&!fd.name){toast('Введите название','error');return;}step++;update();};
    document.querySelectorAll('.ncwiz-trig').forEach(function(c){c.onclick=function(){fd.trigger_type=c.dataset.val;update();};});
    document.querySelectorAll('.ncwiz-mode').forEach(function(c){c.onclick=function(){fd.mode=c.dataset.val;update();};});
    var sub=document.getElementById('wiz-submit');if(sub)sub.onclick=async function(){
      sub.disabled=true;sub.innerHTML='<span class="spin"></span> Создание...';

function rArScenarios(){

    if(s.default_behavior)chips.push({t:esc(s.default_behavior),cls:'b-muted'});

function rArTriggers(){

  });
  allTriggers.sort(function(a,b){return (a.priority||99)-(b.priority||99);});

    '<div class="ipn mt3"><div class="txs fbol">Порядок обработки:</div><div class="txs c-m mt1">1. Проверяется каждый триггер по приоритету<br>2. Первый сработавший триггер определяет ответ<br>3. Если ни один не сработал - используется поведение по умолчанию</div></div>'+

  function saveStep(){
    switch(step){
      case 1:var n=document.getElementById('wiz-name');if(n)fd.name=n.value.trim();var a=document.getElementById('wiz-aud');if(a)fd.audience_id=a.value;var ex=document.getElementById('wiz-excl');if(ex)fd.exclude_audience_id=ex.value;var fo=document.getElementById('wiz-fon');if(fo)fd.filter_online=fo.checked;var fu=document.getElementById('wiz-fun');if(fu)fd.filter_username=fu.checked;var fs=document.getElementById('wiz-fscore');if(fs)fd.filter_ai_score_min=parseInt(fs.value)||0;break;
      case 2:var t=document.getElementById('wiz-tpl');if(t)fd.template_id=t.value;var ai=document.getElementById('wiz-aip');if(ai)fd.ai_personalize=ai.checked;break;
      case 3:var ac=document.getElementById('wiz-acc');if(ac)fd.account_ids=ac.value;var di=document.getElementById('wiz-dist');if(di)fd.distribution=di.value;var mp=document.getElementById('wiz-mpd');if(mp)fd.max_per_day=parseInt(mp.value)||30;var dm=document.getElementById('wiz-dmin');if(dm)fd.delay_min=parseInt(dm.value)||30;var dx=document.getElementById('wiz-dmax');if(dx)fd.delay_max=parseInt(dx.value)||180;break;
      case 4:var st=document.querySelector('input[name="wiz-st"]:checked');if(st)fd.start_type=st.value;var ahs=document.getElementById('wiz-ahs');if(ahs)fd.active_hours_start=parseInt(ahs.value)||10;var ahe=document.getElementById('wiz-ahe');if(ahe)fd.active_hours_end=parseInt(ahe.value)||21;var rmp=document.getElementById('wiz-ramp');if(rmp)fd.ramp_up=rmp.checked;break;
      case 5:var fl=document.getElementById('wiz-flood');if(fl)fd.flood_behavior=fl.value;var es=document.getElementById('wiz-estop');if(es)fd.emergency_stop_pct=parseInt(es.value)||30;var sk=document.getElementById('wiz-skip');if(sk)fd.skip_list=sk.checked;var ais=document.getElementById('wiz-aisales');if(ais)fd.connect_ai_sales=ais.checked;break;
    }
  }
  function show(){
    var h='<div class="dlg-ov" id="mov"><div class="dlg dlg-xl"><div class="dlg-hd"><div class="dlg-tt">'+ic('send')+' Новая DM кампания &mdash; шаг '+step+' из '+maxStep+'</div></div><div class="dlg-bd" id="wiz-content">'+renderWizard()+'</div></div></div>';
    document.body.insertAdjacentHTML('beforeend',h);bind();
  }
  function update(){var c=document.getElementById('wiz-content');if(!c)return;c.innerHTML=renderWizard();bind();}
  function bind(){
    var ov=document.getElementById('mov');if(!ov)return;
    ov.onclick=function(e){if(e.target===ov)mClose('mov');};
    var cl=document.getElementById('mcl');if(cl)cl.onclick=function(){mClose('mov');};
    function ek(e){if(e.key==='Escape'){mClose('mov');document.removeEventListener('keydown',ek);}}document.addEventListener('keydown',ek);
    var prev=document.getElementById('wiz-prev');if(prev)prev.onclick=function(){saveStep();step--;update();};
    var next=document.getElementById('wiz-next');if(next)next.onclick=function(){saveStep();if(step===1&&!fd.name){toast('Введите название','error');return;}if(step===1&&!fd.audience_id){toast('Выберите аудиторию','error');return;}if(step===2&&!fd.template_id){toast('Выберите шаблон','error');return;}step++;update();};
    var sub=document.getElementById('wiz-submit');if(sub)sub.onclick=async function(){
      sub.disabled=true;sub.innerHTML='<span class="spin"></span> Запуск...';
      var accIds=fd.account_ids.trim().split('\n').map(function(s){return s.trim();}).filter(Boolean);
      try{
        await ap('/dm-campaigns',{name:fd.name,audience_id:fd.audience_id,template_id:fd.template_id,account_ids:accIds.length?accIds:undefined,distribution:fd.distribution,config:{exclude_audience_id:fd.exclude_audience_id||undefined,filter_online:fd.filter_online,filter_username:fd.filter_username,filter_ai_score_min:fd.filter_ai_score_min,ai_personalize:fd.ai_personalize,max_per_day:fd.max_per_day,delay_min:fd.delay_min,delay_max:fd.delay_max,start_type:fd.start_type,active_hours_start:fd.active_hours_start,active_hours_end:fd.active_hours_end,ramp_up:fd.ramp_up,flood_behavior:fd.flood_behavior,emergency_stop_pct:fd.emergency_stop_pct,skip_list:fd.skip_list,connect_ai_sales:fd.connect_ai_sales}});
        toast('Кампания создана','success');mClose('mov');dmcLoaded=false;await ldDmc();if(S.sec==='dm-campaign')rDmCampaign(document.getElementById('mc'));
      }catch(er){toast(er.message,'error');sub.disabled=false;sub.innerHTML='\u25B6 Запустить';}

function rChatBroadcast(el){
  if(cbcDetail){rCbcDetail(el);return;}
  if(!cbcLoaded){el.innerHTML='<div class="sy4">'+skel('3rem')+skel('2.5rem')+skel('24rem')+'</div>';ldCbc().then(function(){if(S.sec==='chat-broadcast')rChatBroadcast(el);});return;}
  var st=cbcStats||{};
  el.innerHTML='<div class="sy4">'+
    pageHead('Рассылка по чатам','','<button class="btn btn-sm btn-primary" id="cbc-add">'+ic('plus')+' Новая кампания</button>')+
    kpiHtml([
      {v:st.total_campaigns||0,l:'Всего кампаний',bg:'rgba(168,85,247,0.12)',fg:'var(--purple-500)'},
      {v:st.total_posted||0,l:'Опубликовано',bg:'rgba(59,130,246,0.12)',fg:'var(--blue-500)'},
      {v:st.total_deleted||0,l:'Удалено модерами',bg:'rgba(239,68,68,0.12)',fg:'var(--red-500)'},
      {v:(st.survival_rate!=null?st.survival_rate+'%':'0%'),l:'Выживаемость',bg:'rgba(34,197,94,0.12)',fg:'var(--emerald-500)'}
    ])+
    (cbcItems.length>0
      ?'<div class="g g2">'+cbcItems.map(function(c){
        var u=(c.status||'').toUpperCase();
        var posted=c.posted_count||0,total=c.total_count||1,deleted=c.deleted_count||0;
        var channels=c.target_channels?c.target_channels.length:0;
        var pct=total>0?Math.round(posted/total*100):0;
        return '<div class="wf-card cbc-card" data-id="'+c.id+'" style="cursor:pointer">'+
          '<div class="wf-card-head">'+
            '<div class="wf-card-icon" style="background:rgba(168,85,247,0.1)">\uD83D\uDCE2</div>'+
            '<div class="f1 mw0">'+
              '<div class="f ac g2x"><span class="tsm fbol">'+esc(c.name||'--')+'</span>'+cbcBdg(c.status)+'</div>'+
              '<div class="txs c-m mt1">'+channels+' каналов</div>'+
            '</div>'+
          '</div>'+
          '<div class="mt3"><div class="f ac jb txs c-m mb1"><span>'+posted+' / '+total+'</span><span>'+pct+'%</span></div>'+
            '<div class="prog"><div class="prog-fill" style="width:'+pct+'%;background:var(--purple-500)"></div></div></div>'+
          '<div class="wf-card-stats">'+
            '<div class="wf-stat"><div class="wf-stat-val">'+posted+'</div><div class="wf-stat-lbl">Опубликовано</div></div>'+
            '<div class="wf-stat"><div class="wf-stat-val" style="color:var(--red-500)">'+deleted+'</div><div class="wf-stat-lbl">Удалено</div></div>'+
          '</div>'+
          '<div class="f g1h mt2 fw">'+
            (u==='DRAFT'||u==='PAUSED'?'<button class="btn btn-sm cbc-start" data-id="'+c.id+'">'+ic('play')+' Старт</button>':'')+
            (u==='RUNNING'||u==='PAUSED'?'<button class="btn btn-sm btn-danger cbc-stop" data-id="'+c.id+'">'+ic('xcircle')+' Стоп</button>':'')+
            '<button class="btn btn-ghost btn-icon btn-danger cbc-del" data-id="'+c.id+'" title="Удалить">'+ic('trash')+'</button>'+
          '</div>'+
        '</div>';
      }).join('')+'</div>'
      :esHtml('send','Нет кампаний','Создайте кампанию для рассылки по чатам и группам',
        '<button class="btn btn-sm btn-primary" id="cbc-add2">'+ic('plus')+' Новая кампания</button>')
    )+
  '</div>';
  var addB=el.querySelector('#cbc-add');if(addB)addB.onclick=function(){mCrCbc();};
  var addB2=el.querySelector('#cbc-add2');if(addB2)addB2.onclick=function(){mCrCbc();};
  el.querySelectorAll('.cbc-card').forEach(function(card){
    card.onclick=function(e){if(e.target.closest('.cbc-start,.cbc-stop,.cbc-del'))return;
      cbcDetail={id:card.dataset.id,item:cbcItems.find(function(x){return x.id===card.dataset.id;})};rChatBroadcast(el);};
  });
  el.querySelectorAll('.cbc-start').forEach(function(b){b.onclick=async function(e){e.stopPropagation();b.disabled=true;b.innerHTML='<span class="spin"></span>';try{await ap('/chat-broadcasts/'+b.dataset.id+'/start');toast('Кампания запущена','success');cbcLoaded=false;await ldCbc();if(S.sec==='chat-broadcast')rChatBroadcast(document.getElementById('mc'));}catch(er){toast(er.message,'error');b.disabled=false;b.innerHTML=ic('play')+' Старт';}};});
  el.querySelectorAll('.cbc-stop').forEach(function(b){b.onclick=async function(e){e.stopPropagation();b.disabled=true;b.innerHTML='<span class="spin"></span>';try{await ap('/chat-broadcasts/'+b.dataset.id+'/stop');toast('Кампания остановлена','success');cbcLoaded=false;await ldCbc();if(S.sec==='chat-broadcast')rChatBroadcast(document.getElementById('mc'));}catch(er){toast(er.message,'error');b.disabled=false;b.innerHTML=ic('xcircle')+' Стоп';}};});
  el.querySelectorAll('.cbc-del').forEach(function(b){b.onclick=async function(e){e.stopPropagation();if(!confirm('Удалить кампанию?'))return;b.disabled=true;try{await aD('/chat-broadcasts/'+b.dataset.id);toast('Кампания удалена','success');cbcLoaded=false;await ldCbc();if(S.sec==='chat-broadcast')rChatBroadcast(document.getElementById('mc'));}catch(er){toast(er.message,'error');b.disabled=false;}};});
}

  af('/chat-broadcasts/'+cbcDetail.id+'/posts').then(function(r){

      '</div>'+
      '<div class="card"><div class="card-head"><div class="card-title">Посты ('+total+')</div></div><div class="card-body flush">'+

          posts.map(function(p){
            var pStCls=((p.status||'').toUpperCase()==='POSTED'?'b-emerald b-ol':(p.status||'').toUpperCase()==='DELETED'?'b-red b-ol':(p.status||'').toUpperCase()==='PENDING'?'b-muted b-ol':'b-muted b-ol');
            return '<tr><td class="fmed">'+esc(p.channel_title||p.channel_username||'--')+'</td><td class="txs c-m" style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.text||p.preview||'--')+'</td><td><span class="badge '+pStCls+'">'+esc(p.status||'--')+'</span></td><td class="fmo">'+(p.reactions_count!=null?p.reactions_count:'\u2014')+'</td><td class="fmo">'+(p.dm_count!=null?p.dm_count:'\u2014')+'</td></tr>';
          }).join('')+
        '</tbody></table></div>'

    el.querySelector('#cbc-back').onclick=function(){cbcDetail=null;rChatBroadcast(el);};
  });
}
function mCrCbc(){
  var step=1,maxStep=5;
  var stepLabels=['Сообщение','Каналы','Аккаунты','Расписание','Safety'];
  var fd={name:'',content_type:'post',template_id:'',slow_mode_behavior:'wait',target_channels:'',exclude_channels:'',distribution:'one_per_chat',posts_per_day:3,account_ids:'',start_type:'now',posting_time:'random',gap_24h:true,delete_detection:true,ban_auto_stop:true,notify:true};
  var tplOpts=[];
  af('/templates?category=CHAT_POST').then(function(r){tplOpts=r.items||[];}).catch(function(){}).finally(function(){show();});

  function renderWizard(){
    var stepsHtml='<div class="wiz-steps">';
    for(var i=1;i<=maxStep;i++){var cls=i<step?'wiz-done':i===step?'wiz-active':'wiz-pending';stepsHtml+='<div class="wiz-step '+cls+'"><span class="wiz-num">'+(i<step?'&#10003;':i)+'</span><span class="wiz-label">'+stepLabels[i-1]+'</span></div>';}
    stepsHtml+='</div>';
    var bodyHtml='<div class="wiz-body sy3">';
    switch(step){
      case 1:
        bodyHtml+='<div><label class="lbl">Название кампании *</label><input class="input tsm" id="wiz-name" value="'+esc(fd.name)+'" placeholder="Бизнес-чаты прогрев"></div>'+
          '<div><label class="lbl">Тип контента</label><div class="f g3x mt2"><label class="f ac g1h tsm"><input type="radio" name="wiz-ct" value="post"'+(fd.content_type==='post'?' checked':'')+'> Пост</label><label class="f ac g1h tsm"><input type="radio" name="wiz-ct" value="reply"'+(fd.content_type==='reply'?' checked':'')+'> Reply</label><label class="f ac g1h tsm"><input type="radio" name="wiz-ct" value="thread"'+(fd.content_type==='thread'?' checked':'')+'> Тред</label></div></div>'+
          '<div><label class="lbl">Шаблон *</label><div class="sel-w"><select class="sel" id="wiz-tpl"><option value="">-- выберите --</option>'+tplOpts.map(function(t){return '<option value="'+t.id+'"'+(fd.template_id===t.id?' selected':'')+'>'+esc(t.name)+'</option>';}).join('')+'</select></div></div>'+
          '<div><label class="lbl">Поведение при slow-mode</label><div class="sel-w"><select class="sel" id="wiz-slow"><option value="wait"'+(fd.slow_mode_behavior==='wait'?' selected':'')+'>Ждать окончания</option><option value="skip"'+(fd.slow_mode_behavior==='skip'?' selected':'')+'>Пропустить</option><option value="next_account"'+(fd.slow_mode_behavior==='next_account'?' selected':'')+'>Другой аккаунт</option></select></div></div>';
        break;
      case 2:
        bodyHtml+='<div><label class="lbl">Целевые каналы (по одному на строку) *'+tip('Список чатов куда будут отправляться сообщения. По одному на строку')+'</label><textarea class="ta" id="wiz-ch" placeholder="@crypto_chat\n@business_group\nhttps://t.me/channel123" style="min-height:140px">'+esc(fd.target_channels)+'</textarea></div>'+
          '<div><label class="lbl">Исключить каналы</label><textarea class="ta" id="wiz-exch" placeholder="@exclude_channel" style="min-height:60px">'+esc(fd.exclude_channels)+'</textarea></div>';
        break;
      case 3:
        bodyHtml+='<div><label class="lbl">Распределение аккаунтов'+tip('1 чат = 1 аккаунт \u2014 каждый чат обслуживается одним аккаунтом, round-robin \u2014 чередование')+'</label><div class="sel-w"><select class="sel" id="wiz-dist"><option value="one_per_chat"'+(fd.distribution==='one_per_chat'?' selected':'')+'>1 чат = 1 аккаунт</option><option value="round_robin"'+(fd.distribution==='round_robin'?' selected':'')+'>Round-robin</option></select></div></div>'+
          '<div><label class="lbl">Постов / аккаунт / день</label><input class="input tsm" type="number" id="wiz-ppd" value="'+fd.posts_per_day+'" style="width:8rem"></div>'+
          '<div><label class="lbl">Аккаунты (ID по строке, пусто = все активные)</label><textarea class="ta" id="wiz-acc" placeholder="Оставьте пустым" style="min-height:80px">'+esc(fd.account_ids)+'</textarea></div>';
        break;
      case 4:
        bodyHtml+='<div><label class="lbl">Начало</label><div class="f g3x mt2"><label class="f ac g1h tsm"><input type="radio" name="wiz-st" value="now"'+(fd.start_type==='now'?' checked':'')+'> Сразу</label><label class="f ac g1h tsm"><input type="radio" name="wiz-st" value="schedule"'+(fd.start_type==='schedule'?' checked':'')+'> По графику</label></div></div>'+
          '<div><label class="lbl">Время постинга</label><div class="sel-w"><select class="sel" id="wiz-pt"><option value="ai"'+(fd.posting_time==='ai'?' selected':'')+'>AI-оптимальное</option><option value="random"'+(fd.posting_time==='random'?' selected':'')+'>Случайное</option><option value="specific"'+(fd.posting_time==='specific'?' selected':'')+'>Конкретное время</option></select></div></div>'+
          '<div class="mt3"><label class="f ac g2x" style="cursor:pointer"><input type="checkbox" class="chk" id="wiz-gap"'+(fd.gap_24h?' checked':'')+'><span class="tsm">Гарантировать 24ч между постами в одном канале</span></label></div>';
        break;
      case 5:
        var chCount=fd.target_channels?fd.target_channels.split('\n').filter(function(s){return s.trim();}).length:0;
        bodyHtml+='<div class="sy2h"><label class="f ac g2x" style="cursor:pointer"><input type="checkbox" class="chk" id="wiz-deldet"'+(fd.delete_detection?' checked':'')+'><span class="tsm">Отслеживать удаление постов модераторами</span></label><label class="f ac g2x" style="cursor:pointer"><input type="checkbox" class="chk" id="wiz-banstop"'+(fd.ban_auto_stop?' checked':'')+'><span class="tsm">Автостоп при бане аккаунта из чата</span></label><label class="f ac g2x" style="cursor:pointer"><input type="checkbox" class="chk" id="wiz-notif"'+(fd.notify?' checked':'')+'><span class="tsm">Уведомления в TG-бот</span></label></div>'+
          '<div class="sep"></div><div class="txs fsem upc c-m tkw mb2">Прогноз</div><div class="wiz-cost">'+
            '<div class="wiz-cost-row"><span>Название</span><span class="fbol">'+esc(fd.name||'--')+'</span></div>'+
            '<div class="wiz-cost-row"><span>Каналов</span><span class="fbol">'+chCount+'</span></div>'+
            '<div class="wiz-cost-row"><span>Постов / день</span><span>'+fd.posts_per_day+'</span></div>'+
            '<div class="wiz-cost-row"><span>Распределение</span><span>'+esc(fd.distribution)+'</span></div>'+
          '</div>';
        break;
    }
    bodyHtml+='</div>';
    var footerHtml='<div class="dlg-ft">'+(step>1?'<button class="btn btn-sm" id="wiz-prev">\u2190 Назад</button>':'<button class="btn btn-sm" id="mcl">Отмена</button>')+(step<maxStep?'<button class="btn btn-sm btn-primary" id="wiz-next">Далее \u2192</button>':'<button class="btn btn-sm btn-primary" id="wiz-submit">\u25B6 Запустить</button>')+'</div>';
    return stepsHtml+bodyHtml+footerHtml;
  }
  function saveStep(){
    switch(step){
      case 1:var n=document.getElementById('wiz-name');if(n)fd.name=n.value.trim();var ct=document.querySelector('input[name="wiz-ct"]:checked');if(ct)fd.content_type=ct.value;var t=document.getElementById('wiz-tpl');if(t)fd.template_id=t.value;var sl=document.getElementById('wiz-slow');if(sl)fd.slow_mode_behavior=sl.value;break;
      case 2:var ch=document.getElementById('wiz-ch');if(ch)fd.target_channels=ch.value;var ex=document.getElementById('wiz-exch');if(ex)fd.exclude_channels=ex.value;break;
      case 3:var di=document.getElementById('wiz-dist');if(di)fd.distribution=di.value;var pp=document.getElementById('wiz-ppd');if(pp)fd.posts_per_day=parseInt(pp.value)||3;var ac=document.getElementById('wiz-acc');if(ac)fd.account_ids=ac.value;break;
      case 4:var st=document.querySelector('input[name="wiz-st"]:checked');if(st)fd.start_type=st.value;var pt=document.getElementById('wiz-pt');if(pt)fd.posting_time=pt.value;var g=document.getElementById('wiz-gap');if(g)fd.gap_24h=g.checked;break;
      case 5:var dd=document.getElementById('wiz-deldet');if(dd)fd.delete_detection=dd.checked;var bs=document.getElementById('wiz-banstop');if(bs)fd.ban_auto_stop=bs.checked;var no=document.getElementById('wiz-notif');if(no)fd.notify=no.checked;break;
    }
  }
  function show(){
    var h='<div class="dlg-ov" id="mov"><div class="dlg dlg-xl"><div class="dlg-hd"><div class="dlg-tt">'+ic('send')+' Новая кампания по чатам &mdash; шаг '+step+' из '+maxStep+'</div></div><div class="dlg-bd" id="wiz-content">'+renderWizard()+'</div></div></div>';
    document.body.insertAdjacentHTML('beforeend',h);bind();
  }
  function update(){var c=document.getElementById('wiz-content');if(!c)return;c.innerHTML=renderWizard();bind();}
  function bind(){
    var ov=document.getElementById('mov');if(!ov)return;
    ov.onclick=function(e){if(e.target===ov)mClose('mov');};
    var cl=document.getElementById('mcl');if(cl)cl.onclick=function(){mClose('mov');};
    function ek(e){if(e.key==='Escape'){mClose('mov');document.removeEventListener('keydown',ek);}}document.addEventListener('keydown',ek);
    var prev=document.getElementById('wiz-prev');if(prev)prev.onclick=function(){saveStep();step--;update();};
    var next=document.getElementById('wiz-next');if(next)next.onclick=function(){saveStep();if(step===1&&!fd.name){toast('Введите название','error');return;}if(step===1&&!fd.template_id){toast('Выберите шаблон','error');return;}if(step===2){var chs=fd.target_channels.trim().split('\n').filter(function(s){return s.trim();});if(!chs.length){toast('Укажите каналы','error');return;}}step++;update();};
    var sub=document.getElementById('wiz-submit');if(sub)sub.onclick=async function(){
      saveStep();sub.disabled=true;sub.innerHTML='<span class="spin"></span> Запуск...';
      var channels=fd.target_channels.trim().split('\n').map(function(s){return s.trim();}).filter(Boolean);
      var accIds=fd.account_ids.trim().split('\n').map(function(s){return s.trim();}).filter(Boolean);
      try{
        await ap('/chat-broadcasts',{name:fd.name,template_id:fd.template_id,target_channels:channels,account_ids:accIds.length?accIds:undefined,config:{content_type:fd.content_type,slow_mode_behavior:fd.slow_mode_behavior,exclude_channels:fd.exclude_channels.trim().split('\n').filter(function(s){return s.trim();}),distribution:fd.distribution,posts_per_day:fd.posts_per_day,start_type:fd.start_type,posting_time:fd.posting_time,gap_24h:fd.gap_24h,delete_detection:fd.delete_detection,ban_auto_stop:fd.ban_auto_stop,notify:fd.notify}});
        toast('Кампания создана','success');mClose('mov');cbcLoaded=false;await ldCbc();if(S.sec==='chat-broadcast')rChatBroadcast(document.getElementById('mc'));
      }catch(er){toast(er.message,'error');sub.disabled=false;sub.innerHTML='\u25B6 Запустить';}
    };
  }
}

/* ── 16. Inviting ── */
var invLoaded=false,invItems=[],invStats=null,invDetail=null;
var INV_ST={DRAFT:'b-muted b-ol',RUNNING:'b-blue b-ol',PAUSED:'b-yellow b-ol',COMPLETED:'b-emerald b-ol',STOPPED:'b-red b-ol',EMERGENCY_STOPPED:'b-red b-ol'};
var INV_STL={DRAFT:'Черновик',RUNNING:'Активна',PAUSED:'Пауза',COMPLETED:'Завершена',STOPPED:'Остановлена',EMERGENCY_STOPPED:'Аварийно'};
var INV_MODE={DIRECT:'b-blue b-ol',INVITE_LINK:'b-purple b-ol'};
var INV_MODE_L={DIRECT:'Direct',INVITE_LINK:'Invite Link'};
var INV_RES={SUCCESS:'b-emerald b-ol',PRIVACY:'b-yellow b-ol',ALREADY:'b-muted b-ol',NOT_FOUND:'b-red b-ol',PEER_FLOOD:'b-red b-ol',FAILED:'b-red b-ol'};
async function ldInv(){try{var r=await af('/invite-campaigns');var s=await af('/invite-campaigns/stats');invItems=r.items||[];invStats=s;invLoaded=true;}catch(e){toast('Ошибка загрузки инвайтинг-кампаний: '+e.message,'error');invLoaded=true;}}
function invBdg(s){var u=(s||'').toUpperCase();return '<span class="badge '+(INV_ST[u]||'b-muted b-ol')+'"'+(u==='RUNNING'?' style="animation:pulse-dot 2s infinite"':'')+'>'+esc(INV_STL[u]||s||'--')+'</span>';}
function rInviting(el){
  if(invDetail){rInvDetail(el);return;}
  if(!invLoaded){el.innerHTML='<div class="sy4">'+skel('3rem')+skel('2.5rem')+skel('24rem')+'</div>';ldInv().then(function(){if(S.sec==='inviting')rInviting(el);});return;}
  var st=invStats||{};
  el.innerHTML='<div class="sy4">'+
    pageHead('Инвайтинг в канал','','<button class="btn btn-sm btn-primary" id="inv-add">'+ic('plus')+' Новая кампания</button>')+
    kpiHtml([
      {v:st.total_campaigns||0,l:'Всего кампаний',bg:'rgba(59,130,246,0.12)',fg:'var(--blue-500)'},
      {v:st.total_invites||0,l:'Отправлено',bg:'rgba(168,85,247,0.12)',fg:'var(--purple-500)'},
      {v:st.total_success||0,l:'Успешных',bg:'rgba(34,197,94,0.12)',fg:'var(--emerald-500)'},
      {v:(st.success_rate!=null?st.success_rate+'%':'0%'),l:'Конверсия',bg:'rgba(249,115,22,0.12)',fg:'var(--orange-500)'}
    ])+
    (invItems.length>0
      ?'<div class="g g2">'+invItems.map(function(c){
        var u=(c.status||'').toUpperCase();
        var success=c.success_count||0,total=c.total_count||1;
        var pct=total>0?Math.round(success/total*100):0;
        var modeU=(c.mode||'').toUpperCase();
        return '<div class="wf-card inv-card" data-id="'+c.id+'" style="cursor:pointer">'+
          '<div class="wf-card-head">'+
            '<div class="wf-card-icon" style="background:rgba(59,130,246,0.1)">\uD83D\uDC4B</div>'+
            '<div class="f1 mw0">'+
              '<div class="f ac g2x"><span class="tsm fbol">'+esc(c.name||'--')+'</span>'+invBdg(c.status)+'</div>'+
              '<div class="f ac g1h mt1"><span class="badge '+(INV_MODE[modeU]||'b-muted b-ol')+'">'+esc(INV_MODE_L[modeU]||c.mode||'--')+'</span>'+
              (c.target_channel_title?'<span class="txs c-m">'+esc(c.target_channel_title)+'</span>':'')+'</div>'+

function mCrInv(){

          '<div><label class="lbl">Целевой канал * (где ваш аккаунт админ)'+tip('Группа или канал куда будут приглашаться пользователи')+'</label><input class="input tsm" id="wiz-target" value="'+esc(fd.target_channel)+'" placeholder="@my_promo_channel или ID канала"></div>'+
          '<div><label class="lbl">Режим'+tip('DIRECT \u2014 напрямую добавляет в группу, INVITE_LINK \u2014 через пригласительную ссылку')+'</label><div class="f g3x mt2"><label class="f ac g1h tsm"><input type="radio" name="wiz-mode" value="DIRECT"'+(fd.mode==='DIRECT'?' checked':'')+'> Direct (напрямую)</label><label class="f ac g1h tsm"><input type="radio" name="wiz-mode" value="INVITE_LINK"'+(fd.mode==='INVITE_LINK'?' checked':'')+'> Invite Link</label></div></div>';
        break;

        bodyHtml+='<div><label class="lbl">Аудитория *</label><div class="sel-w"><select class="sel" id="wiz-aud"><option value="">-- выберите --</option>'+audOpts.map(function(a){return '<option value="'+a.id+'"'+(fd.audience_id===a.id?' selected':'')+'>'+esc(a.name)+' ('+esc(a.total_count||0)+')</option>';}).join('')+'</select></div></div>'+

          '<div class="mt2"><label class="lbl">AI-score минимум</label><input class="input tsm" type="number" id="wiz-fscore" value="'+fd.filter_ai_score_min+'" min="0" max="100" style="width:8rem"></div>';
        break;

        bodyHtml+='<div><label class="lbl">Аккаунты (только ACTIVE, админ в целевом канале)</label><textarea class="ta" id="wiz-acc" placeholder="Оставьте пустым для авто-выбора всех подходящих аккаунтов" style="min-height:100px">'+esc(fd.account_ids)+'</textarea><div class="txs c-m mt1">Будут использованы только аккаунты со статусом ACTIVE, которые являются админами в указанном канале</div></div>';
        break;
      case 4:
        bodyHtml+='<div><label class="lbl">Поведение при FloodWait</label><div class="sel-w"><select class="sel" id="wiz-flood"><option value="pause_24h"'+(fd.flood_behavior==='pause_24h'?' selected':'')+'>Пауза 24ч</option><option value="pause_48h"'+(fd.flood_behavior==='pause_48h'?' selected':'')+'>Пауза 48ч</option><option value="switch_account"'+(fd.flood_behavior==='switch_account'?' selected':'')+'>Переключить аккаунт</option></select></div></div>'+
          '<div class="g g2 mt3"><div><label class="lbl">Порог PrivacyRestricted (%)</label><input class="input tsm" type="number" id="wiz-priv" value="'+fd.privacy_threshold+'" min="1" max="100"><div class="txs c-m mt1">Остановка если % приватных профилей превысит значение</div></div><div><label class="lbl">Порог аварийной остановки (%)</label><input class="input tsm" type="number" id="wiz-estop" value="'+fd.emergency_stop_pct+'" min="1" max="100"><div class="txs c-m mt1">Остановка при превышении % ошибок</div></div></div>'+

    return stepsHtml+bodyHtml+footerHtml;

  function saveStep(){
    switch(step){
      case 1:var n=document.getElementById('wiz-name');if(n)fd.name=n.value.trim();var t=document.getElementById('wiz-target');if(t)fd.target_channel=t.value.trim();var m=document.querySelector('input[name="wiz-mode"]:checked');if(m)fd.mode=m.value;break;
      case 2:var a=document.getElementById('wiz-aud');if(a)fd.audience_id=a.value;var fp=document.getElementById('wiz-fprem');if(fp)fd.filter_premium=fp.checked;var fo=document.getElementById('wiz-fonl');if(fo)fd.filter_online=fo.checked;var fs=document.getElementById('wiz-fscore');if(fs)fd.filter_ai_score_min=parseInt(fs.value)||0;break;
      case 3:var ac=document.getElementById('wiz-acc');if(ac)fd.account_ids=ac.value;break;
      case 4:var fl=document.getElementById('wiz-flood');if(fl)fd.flood_behavior=fl.value;var pr=document.getElementById('wiz-priv');if(pr)fd.privacy_threshold=parseInt(pr.value)||20;var es=document.getElementById('wiz-estop');if(es)fd.emergency_stop_pct=parseInt(es.value)||30;var rp=document.getElementById('wiz-ramp');if(rp)fd.ramp_up=rp.checked;break;

  function update(){var c=document.getElementById('wiz-content');if(!c)return;c.innerHTML=renderWizard();bind();}
  function bind(){
    var ov=document.getElementById('mov');if(!ov)return;
    ov.onclick=function(e){if(e.target===ov)mClose('mov');};
    var cl=document.getElementById('mcl');if(cl)cl.onclick=function(){mClose('mov');};
    function ek(e){if(e.key==='Escape'){mClose('mov');document.removeEventListener('keydown',ek);}}document.addEventListener('keydown',ek);
    var prev=document.getElementById('wiz-prev');if(prev)prev.onclick=function(){saveStep();step--;update();};
    var next=document.getElementById('wiz-next');if(next)next.onclick=function(){saveStep();if(step===1&&!fd.name){toast('Введите название','error');return;}if(step===1&&!fd.target_channel){toast('Укажите целевой канал','error');return;}if(step===2&&!fd.audience_id){toast('Выберите аудиторию','error');return;}step++;update();};

/* Boost drip chart helper */
function bstDripChart(cur,tgt,days){
  days=days||7;var planned=[];var actual=[];var perDay=Math.ceil(tgt/days);
  for(var i=0;i<days;i++){var p=Math.min(perDay*(i+1),tgt);planned.push(p);}
  var curves=[0.08,0.22,0.42,0.58,0.72,0.88,1.0];
  for(var i=0;i<days;i++){var a=Math.round(cur*curves[Math.min(i,curves.length-1)]);actual.push(Math.min(a,planned[i]));}
  var mx=tgt||1;
  var bars='';for(var i=0;i<days;i++){
    var ph=Math.max(4,Math.round(planned[i]/mx*70));var ah=Math.max(2,Math.round(actual[i]/mx*70));
    bars+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">'+
      '<div style="width:100%;background:rgba(59,130,246,0.2);height:'+ph+'px;border-radius:2px"></div>'+
      '<div style="width:100%;background:var(--blue-500);height:'+ah+'px;border-radius:2px"></div>'+
      '<span class="txs c-m">\u04141'+(i>0?'+'+(i):'')+'</span></div>';
  }
  return '<div style="display:flex;gap:4px;align-items:end;height:90px">'+bars+'</div>'+
    '<div class="f ac jc g3x mt2 txs c-m"><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:6px;background:rgba(59,130,246,0.2);border-radius:1px;display:inline-block"></span> \u041F\u043B\u0430\u043D</span><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:6px;background:var(--blue-500);border-radius:1px;display:inline-block"></span> \u0424\u0430\u043A\u0442</span></div>';
}

  function restoreStep(){

/* Create Channels detail view */
function rCchDet(el,task){

      {v:pending,l:'\u0412 \u043E\u0447\u0435\u0440\u0435\u0434\u0438',bg:'rgba(234,179,8,0.12)',fg:'var(--yellow-500)'},
      {v:failed,l:'\u041E\u0448\u0438\u0431\u043E\u043A',bg:'rgba(239,68,68,0.12)',fg:'var(--red-500)'}
    ])+
    '<div class="det-section mt4"><div class="det-section-title">\u0421\u0442\u0430\u0442\u0443\u0441 \u043A\u0430\u043D\u0430\u043B\u043E\u0432</div>'+

/* Create Channels 6-step wizard */
function mCrCch(){
  var cchWizStep=1;
  var sv={name:'',chType:'CHANNEL',count:5,namePat:'\u041A\u0430\u043D\u0430\u043B {N}',userPat:'',desc:'',accIds:'',masterAcc:'',pinnedMsg:'',welcomePost:''};
  function renderWiz(){
    var steps=['\u0422\u0438\u043F \u0438 \u043A\u043E\u043B\u0438\u0447\u0435\u0441\u0442\u0432\u043E','\u0418\u043C\u0435\u043D\u0430','\u041F\u0440\u043E\u0444\u0438\u043B\u044C','\u0410\u043A\u043A\u0430\u0443\u043D\u0442\u044B','\u041A\u043E\u043D\u0442\u0435\u043D\u0442','\u0417\u0430\u043F\u0443\u0441\u043A'];
    var stepsHtml='<div class="wiz-steps">'+steps.map(function(s,i){
      var n=i+1;var cls=n<cchWizStep?'wiz-done':n===cchWizStep?'wiz-active':'wiz-pending';
      return '<div class="wiz-step '+cls+'"><span class="wiz-num">'+(n<cchWizStep?'\u2713':n)+'</span><span>'+s+'</span></div>';
    }).join('')+'</div>';
    var bodyHtml='';
    if(cchWizStep===1){

  function saveStep(){
    if(cchWizStep===1){var n=document.getElementById('ccw-name');if(n)sv.name=n.value;var c=document.getElementById('ccw-count');if(c)sv.count=parseInt(c.value)||5;}

    if(cchWizStep===3){var d=document.getElementById('ccw-desc');if(d)sv.desc=d.value;}
    if(cchWizStep===4){var a=document.getElementById('ccw-accs');if(a)sv.accIds=a.value;var m=document.getElementById('ccw-master');if(m)sv.masterAcc=m.value;}
    if(cchWizStep===5){var p=document.getElementById('ccw-pinned');if(p)sv.pinnedMsg=p.value;var w=document.getElementById('ccw-welcome');if(w)sv.welcomePost=w.value;}
  }
  function restoreStep(){
    if(cchWizStep===1){var n=document.getElementById('ccw-name');if(n)n.value=sv.name;var c=document.getElementById('ccw-count');if(c)c.value=sv.count;document.querySelectorAll('.ccw-type').forEach(function(t){t.onclick=function(){sv.chType=t.dataset.type;document.querySelectorAll('.ccw-type').forEach(function(x){x.style.borderColor='';x.classList.remove('active');});t.style.borderColor='var(--blue-500)';t.classList.add('active');};if(t.dataset.type===sv.chType){t.style.borderColor='var(--blue-500)';t.classList.add('active');}});}
    if(cchWizStep===2){var np=document.getElementById('ccw-name-pat');if(np)np.value=sv.namePat;var up=document.getElementById('ccw-user-pat');if(up)up.value=sv.userPat;}
    if(cchWizStep===3){var d=document.getElementById('ccw-desc');if(d)d.value=sv.desc;}
    if(cchWizStep===4){var a=document.getElementById('ccw-accs');if(a)a.value=sv.accIds;var m=document.getElementById('ccw-master');if(m)m.value=sv.masterAcc;}
    if(cchWizStep===5){var p=document.getElementById('ccw-pinned');if(p)p.value=sv.pinnedMsg;var w=document.getElementById('ccw-welcome');if(w)w.value=sv.welcomePost;}
  }
  function mount(){
    var old=document.getElementById('mov');if(old)old.remove();
    document.body.insertAdjacentHTML('beforeend',renderWiz());
    mBind('mov','mcl');restoreStep();
    var nxt=document.getElementById('ccw-next');if(nxt)nxt.onclick=function(){
      if(cchWizStep===1){if(!document.getElementById('ccw-name').value.trim()){toast('\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043D\u0430\u0437\u0432\u0430\u043D\u0438\u0435','error');return;}}

      saveStep();cchWizStep++;mount();
    };
    var prv=document.getElementById('ccw-prev');if(prv)prv.onclick=function(){saveStep();cchWizStep--;mount();};
    var sub=document.getElementById('ccw-submit');if(sub)sub.onclick=async function(){

      try{
        await ap('/channel-creator/tasks',{name:sv.name.trim(),channel_type:sv.chType,count:sv.count,naming_pattern:sv.namePat.trim(),username_pattern:sv.userPat.trim()||undefined,description:sv.desc.trim()||undefined,account_ids:accIds.length?accIds:undefined,master_account:sv.masterAcc.trim()||undefined,pinned_message:sv.pinnedMsg.trim()||undefined,welcome_post:sv.welcomePost.trim()||undefined});

      }catch(er){toast(er.message,'error');sub.disabled=false;sub.innerHTML='\u0421\u043E\u0437\u0434\u0430\u0442\u044C';}
