services:
  db:
    image: postgres:16-alpine
    container_name: pup-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: pup
      POSTGRES_PASSWORD: pup
      POSTGRES_DB: pup
    ports:
      - "5432:5432"
    volumes:
      - pup_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pup -d pup"]
      interval: 3s
      timeout: 3s
      retries: 20
volumes:
  pup_pgdata:
